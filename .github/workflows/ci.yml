name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - name: Validate catalog
        run: node apps/cli/dist/main.js catalog validate
      - name: Run catalog fixtures
        run: node apps/cli/dist/main.js catalog test

  postgres-migrations:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: cloudranger
          POSTGRES_PASSWORD: cloudranger
          POSTGRES_DB: cloudranger
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cloudranger -d cloudranger"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build workspace dependencies
        run: pnpm build
      - name: Apply Drizzle PostgreSQL migrations
        run: pnpm --filter @cloudranger/db db:migrate
        env:
          CLOUDRANGER_DATABASE_URL: postgresql://cloudranger:cloudranger@localhost:5432/cloudranger
      - name: Run PostgreSQL repository integration tests
        run: pnpm --filter @cloudranger/db test:postgres
        env:
          CLOUDRANGER_TEST_DATABASE_URL: postgresql://cloudranger:cloudranger@localhost:5432/cloudranger
