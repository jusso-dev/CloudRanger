collectors:
  - id: gcp.functions.list
    provider: gcp
    service: cloudfunctions
    description: Lists all Cloud Functions in the project (across all regions) with
      their configuration, including ingress settings, VPC connector, service
      account, runtime and environment (gen1 vs gen2).
    kind: single
    command: gcloud functions list --project {project} --format json
    regional: false
    outputFormat: json
    notes: 'Returns a JSON array at the root, one object per function; use
      resourcesPath "$". Requires cloudfunctions.functions.list permission.
      Shape differs between generations: 1st gen (environment GEN_1) functions
      expose configuration at the top level - ingressSettings, vpcConnector,
      vpcConnectorEgressSettings, availableMemoryMb, httpsTrigger,
      serviceAccountEmail. 2nd gen (environment GEN_2) functions nest most
      configuration under serviceConfig (serviceConfig.ingressSettings,
      serviceConfig.vpcConnector, serviceConfig.serviceAccountEmail). For a
      mixed inventory the top-level ingressSettings/vpcConnector/
      serviceAccountEmail fields are the gen1 shape returned by this command;
      ingressSettings enum values are ALLOW_ALL, ALLOW_INTERNAL_ONLY,
      ALLOW_INTERNAL_AND_GCLB. ingressSettings and vpcConnector may be absent
      when never configured (absence means default ALLOW_ALL / no connector).'
  - id: gcp.functions.get_iam_policy
    provider: gcp
    service: cloudfunctions
    description: IAM policy for one Cloud Function, used to detect public
      (allUsers/allAuthenticatedUsers) invoker bindings that make the function
      endpoint reachable without authentication.
    kind: per_resource
    command: gcloud functions get-iam-policy {resource} --project {project} --format
      json
    regional: false
    parent:
      collector: gcp.functions.list
      itemsPath: $
      resourceField: name
    outputFormat: json
    notes: Requires cloudfunctions.functions.getIamPolicy. Returns a standard Google
      IAM policy object with a bindings array; each binding has role and
      members[] (plus optional condition), alongside etag and version. A
      publicly invokable function has allUsers or allAuthenticatedUsers in the
      members of a binding whose role grants invocation -
      roles/cloudfunctions.invoker for 1st gen and roles/run.invoker for 2nd gen
      (the check is role-agnostic and flags any public member). {resource} is
      the fully qualified function name
      (projects/PROJECT/locations/REGION/functions/NAME) taken from the parent
      list output, which is region-qualified so no --region flag is needed. When
      a function has no explicit IAM policy gcloud returns an object with only
      an etag/version and no bindings key.
