collectors:
  - id: aws.iam.get_credential_report
    provider: aws
    service: iam
    description: IAM credential report — per-user credential status (password
      enablement and last use, MFA state, access key activity/rotation/last use,
      signing certificate state) for every IAM user plus the root account. The
      CLI returns the report as a base64-encoded CSV in the Content field; the
      engine decodes it into one row object per user before evaluation.
    kind: single
    command: aws iam get-credential-report --output json
    regional: false
    outputFormat: json
    decode:
      type: base64Csv
      contentPath: Content
    prepareCommand: aws iam generate-credential-report
    timeoutMs: 180000
    maxAttempts: 5
    initialBackoffMs: 2000
    maxBackoffMs: 15000
    notes: Global IAM endpoint (no region). Requires
      iam:GenerateCredentialReport and iam:GetCredentialReport. The prepare
      command is idempotent — it only asks AWS to (re)build its own server-side
      report and returns State=STARTED/COMPLETE. AWS regenerates the report at
      most every 4 hours; a report can be up to 4 hours stale, which is
      acceptable for these posture checks. If get-credential-report fails with
      ReportInProgress or ReportNotPresent, wait a few seconds and retry the
      get command only. Values in the report are strings, including "true"/
      "false" booleans and the sentinels N/A, no_information and not_supported.
