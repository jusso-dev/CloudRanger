collectors:
  - id: gcp.secretmanager.secrets_list
    provider: gcp
    service: secretmanager
    description: All Secret Manager secrets (metadata) in the project.
    kind: single
    command: gcloud secrets list --project {project} --format json
    regional: false
    outputFormat: json
    notes: >
      Returns a JSON array at the root; each element is a Secret resource
      (metadata only, no payload). Requires secretmanager.secrets.list. Fields
      mirror the Secret Manager REST Secret resource: name, replication
      (automatic|userManaged), rotation, labels, createTime, etag.
  - id: gcp.secretmanager.secret_iam_policy
    provider: gcp
    service: secretmanager
    description: >
      IAM policy for one Secret Manager secret, used to detect public
      (allUsers/allAuthenticatedUsers) bindings that would expose the secret's
      access surface.
    kind: per_resource
    command: gcloud secrets get-iam-policy {resource} --project {project} --format json
    regional: false
    parent:
      collector: gcp.secretmanager.secrets_list
      itemsPath: $
      resourceField: name
    outputFormat: json
    notes: >
      Requires secretmanager.secrets.getIamPolicy. The parent secrets_list emits
      each secret's fully-qualified name (projects/<num>/secrets/<id>); gcloud
      accepts that full resource name as the positional secret argument. Returns
      a standard Cloud IAM policy object: version, etag, and a bindings array
      where each binding has role and members[]. A publicly accessible secret
      has allUsers or allAuthenticatedUsers in any binding's members. Secrets
      often have no per-resource IAM policy (access granted at project level),
      in which case bindings is absent/empty — which is NOT public.
