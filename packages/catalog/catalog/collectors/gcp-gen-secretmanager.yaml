collectors:
  - id: gcp.secretmanager.secrets_list
    provider: gcp
    service: secretmanager
    description: All Secret Manager secrets (metadata) in the project.
    kind: single
    command: gcloud secrets list --project {project} --format json
    regional: false
    outputFormat: json
    notes: >
      Returns a JSON array at the root; each element is a Secret resource
      (metadata only, no payload). Requires secretmanager.secrets.list. Fields
      mirror the Secret Manager REST Secret resource: name, replication
      (automatic|userManaged), rotation, labels, createTime, etag.
