collectors:
  - id: azure.sql.audit_policy_show
    provider: azure
    service: sql
    description: Blob-auditing policy for one SQL logical server (state, retention,
      log destinations).
    kind: per_resource
    command: az sql server audit-policy show --ids {resource} --output json
    regional: false
    parent:
      collector: azure.sql.list_servers
      itemsPath: $
      resourceField: id
    outputFormat: json
    notes: >
      Returns an object with state (Enabled/Disabled), retentionDays,
      isAzureMonitorTargetEnabled, storageEndpoint, and auditActionsAndGroups.
      Requires Microsoft.Sql/servers/auditingSettings/read.
  - id: azure.sql.firewall_rule_list
    provider: azure
    service: sql
    description: Server-level firewall rules for one SQL logical server.
    kind: per_resource
    command: az sql server firewall-rule list --ids {resource} --output json
    regional: false
    parent:
      collector: azure.sql.list_servers
      itemsPath: $
      resourceField: id
    outputFormat: json
    notes: >
      Returns a JSON array of firewall rules, each with name, startIpAddress,
      endIpAddress. The special AllowAllWindowsAzureIps rule uses
      0.0.0.0-0.0.0.0.
  - id: azure.sql.ad_admin_list
    provider: azure
    service: sql
    description: Azure AD administrators configured on one SQL logical server.
    kind: per_resource
    command: az sql server ad-admin list --ids {resource} --output json
    regional: false
    parent:
      collector: azure.sql.list_servers
      itemsPath: $
      resourceField: id
    outputFormat: json
    notes: >
      Returns a JSON array; each entry has login, sid, tenantId,
      administratorType (ActiveDirectory). Empty array when no AAD admin set.
  - id: azure.sql.atp_setting_show
    provider: azure
    service: sql
    description: Advanced Threat Protection / Microsoft Defender for SQL setting for
      one SQL logical server.
    kind: per_resource
    command: az sql server advanced-threat-protection-setting show --ids {resource}
      --output json
    regional: false
    parent:
      collector: azure.sql.list_servers
      itemsPath: $
      resourceField: id
    outputFormat: json
    notes: >
      Returns an object with state (Enabled/Disabled), creationTime, id, name
      (Default), and type. state Enabled means Microsoft Defender for SQL /
      Advanced Threat Protection is turned on at the server level. Requires
      Microsoft.Sql/servers/advancedThreatProtectionSettings/read.
  - id: azure.sql.tde_key_show
    provider: azure
    service: sql
    description: Transparent Data Encryption protector (encryption key) for one SQL
      logical server.
    kind: per_resource
    command: az sql server tde-key show --ids {resource} --output json
    regional: false
    parent:
      collector: azure.sql.list_servers
      itemsPath: $
      resourceField: id
    outputFormat: json
    notes: >
      Returns the server TDE protector object with serverKeyType (ServiceManaged
      or AzureKeyVault), kind (servicemanaged or azurekeyvault), uri (key vault
      key URI when CMK), serverKeyName, and name. AzureKeyVault serverKeyType
      indicates a customer-managed key (CMK). Requires
      Microsoft.Sql/servers/encryptionProtector/read.
