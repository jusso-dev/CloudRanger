controls:
  - id: CR-AZURE-DEFENDER-100
    version: 1.0.0
    provider: azure
    service: defender
    title: Microsoft Defender for Servers plan set to Standard
    description: >
      Verifies the Defender for Cloud pricing tier for VirtualMachines (Defender
      for Servers) is Standard.
    rationale: >
      Without Defender for Servers, VMs lack threat detection, vulnerability
      assessment and just-in-time access, leaving compromised hosts undetected.
    severity: high
    categories:
      - logging
      - resilience
      - identity
    source:
      engine: prowler
      id: defender_ensure_defender_for_server_is_on
      license: Apache-2.0
    collector: azure.security.pricings_list
    resourcesPath: $
    resourceIdField: $scope
    passWhen:
      op: anyItem
      path: value
      condition:
        op: and
        exprs:
          - op: equals
            path: name
            value: VirtualMachines
          - op: equals
            path: pricingTier
            value: Standard
    failMessage: Defender for Servers (VirtualMachines) is not set to the Standard tier.
    passMessage: Defender for Servers is set to the Standard tier.
    remediation:
      summary: Enable the Defender for Servers plan.
      steps:
        - In Defender for Cloud > Environment settings > the subscription, set
          the Servers plan to On (Standard).
      verifyCommand: az security pricing list --output json
    compliance:
      - framework: cis-azure-foundations
        version: "2.1"
        controls:
          - 2.1.2
    references:
      - https://learn.microsoft.com/azure/defender-for-cloud/defender-for-servers-introduction
