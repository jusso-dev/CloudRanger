    provider: azure
    service: defender
    title: Microsoft Defender for Endpoint (WDATP) integration is enabled
    description: >
      Verifies the subscription's Defender for Cloud data-export setting named
      WDATP is enabled so Defender for Servers integrates with Microsoft
      Defender for Endpoint.
    rationale: >
      Without the WDATP integration, servers do not receive Microsoft Defender
      for Endpoint EDR protection, leaving endpoint-level attacks undetected.
    severity: high
    categories:
      - logging
      - resilience
    source:
      engine: prowler
      id: defender_ensure_wdatp_is_enabled
      license: Apache-2.0
    collector: azure.security.settings_list
    aggregate: true
    resourceIdField: $scope
    passWhen:
      op: anyItem
      path: $
      condition:
        op: and
        exprs:
          - op: equals
            path: name
            value: WDATP
          - op: equals
            path: enabled
            value: true
    failMessage: The WDATP (Defender for Endpoint) integration setting is not enabled.
    passMessage: The WDATP (Defender for Endpoint) integration setting is enabled.
    remediation:
      summary: Enable the Microsoft Defender for Endpoint integration.
      steps:
        - In Defender for Cloud > Environment settings > the subscription >
          Integrations, enable the Microsoft Defender for Endpoint integration.
      verifyCommand: az security setting list --output json
    compliance:
