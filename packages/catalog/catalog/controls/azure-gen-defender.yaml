  - id: CR-AZURE-DEFENDER-106
    version: 1.0.0
    provider: azure
    service: defender
    title: Defender for Cloud auto-provisioning of the monitoring agent is On
    description: >
      Verifies the subscription's default auto-provisioning setting is On so the
      Log Analytics / monitoring agent is deployed automatically to hosts.
    rationale: >
      Without auto-provisioning, new and existing machines may lack the agent
      Defender relies on, creating blind spots in threat detection and posture
      coverage.
    severity: medium
    categories:
      - logging
      - resilience
    source:
      engine: prowler
      id: defender_auto_provisioning_log_analytics_agent_vms_on
      license: Apache-2.0
    collector: azure.security.auto_provisioning
    resourcesPath: $
    resourceIdField: $scope
    passWhen:
      op: anyItem
      path: value
      condition:
        op: and
        exprs:
          - op: equals
            path: name
            value: default
          - op: equals
            path: autoProvision
            value: On
    failMessage: Defender for Cloud auto-provisioning is not set to On.
    passMessage: Defender for Cloud auto-provisioning is On.
    remediation:
      summary: Turn on auto-provisioning of the monitoring agent.
      steps:
        - In Defender for Cloud > Environment settings > the subscription > Auto
          provisioning, set the monitoring agent to On.
      verifyCommand: az security auto-provisioning-setting list --output json
    compliance:
      - framework: cis-azure-foundations
        version: "2.1"
        controls:
          - 2.1.14
    references:
      - https://learn.microsoft.com/azure/defender-for-cloud/monitoring-components
