  - id: CR-AZURE-DEFENDER-154
    version: 1.0.0
    provider: azure
    service: defender
    title: Microsoft Defender for Cloud Apps (MCAS) integration is enabled
    description: >
      Verifies the subscription's Defender for Cloud data-export setting named
      MCAS is enabled so Defender integrates with Microsoft Defender for Cloud
      Apps.
    rationale: >
      Without the MCAS integration, cloud app discovery and cross-signal threat
      correlation between Defender for Cloud and Defender for Cloud Apps is
      lost, reducing detection coverage.
    severity: medium
    categories:
      - logging
      - identity
    source:
      engine: prowler
      id: defender_ensure_mcas_is_enabled
      license: Apache-2.0
    collector: azure.security.settings_list
    aggregate: true
    resourceIdField: $scope
    passWhen:
      op: anyItem
      path: $
      condition:
        op: and
        exprs:
          - op: equals
            path: name
            value: MCAS
          - op: equals
            path: enabled
            value: true
    failMessage: The MCAS (Defender for Cloud Apps) integration setting is not enabled.
    passMessage: The MCAS (Defender for Cloud Apps) integration setting is enabled.
    remediation:
      summary: Enable the Microsoft Defender for Cloud Apps integration.
      steps:
        - In Defender for Cloud > Environment settings > the subscription >
          Integrations, enable the Microsoft Defender for Cloud Apps
          integration.
      verifyCommand: az security setting list --output json
    compliance:
      - framework: cis-azure-foundations
        version: "2.1"
        controls:
          - 2.1.15
    references:
      - https://learn.microsoft.com/azure/defender-for-cloud/other-threat-protections
