controls:
  - id: CR-AWS-NEPTUNE-001
    version: 1.0.0
    provider: aws
    service: neptune
    title: Neptune DB cluster has storage encryption enabled
    description: Every Neptune DB cluster is created with encryption at rest so
      StorageEncrypted is true.
    rationale: Unencrypted Neptune storage exposes graph data at rest if the
      underlying volumes or snapshots are compromised; encryption cannot be
      enabled after cluster creation.
    severity: high
    categories:
      - encryption
      - storage
    source:
      engine: prowler
      id: neptune_cluster_storage_encrypted
      license: Apache-2.0
    collector: aws.neptune.describe_db_clusters
    resourcesPath: DBClusters
    resourceIdField: DBClusterIdentifier
    resourceNameField: DBClusterIdentifier
    passWhen:
      op: equals
      path: StorageEncrypted
      value: true
    failMessage: Neptune DB cluster storage is not encrypted at rest.
    passMessage: Neptune DB cluster storage is encrypted at rest.
    remediation:
      summary: Recreate the Neptune cluster with encryption enabled.
      steps:
        - Snapshot the existing cluster and restore it into a new cluster with
          --storage-encrypted and a KMS key.
        - Repoint applications to the new encrypted cluster and decommission the
          old one.
      verifyCommand: aws neptune describe-db-clusters --region <region> --output json
    compliance: []
    references:
      - https://docs.aws.amazon.com/neptune/latest/userguide/encrypt.html
  - id: CR-AWS-NEPTUNE-002
    version: 1.0.0
    provider: aws
    service: neptune
    title: Neptune DB cluster has IAM database authentication enabled
    description: Every Neptune DB cluster has IAMDatabaseAuthenticationEnabled set to true.
    rationale: Without IAM database authentication, connections rely on
      network-level controls alone; IAM auth provides centrally managed,
      short-lived, auditable credentials instead of static access.
    severity: medium
    categories:
      - identity
      - authentication
    source:
      engine: prowler
      id: neptune_cluster_iam_authentication_enabled
      license: Apache-2.0
    collector: aws.neptune.describe_db_clusters
    resourcesPath: DBClusters
    resourceIdField: DBClusterIdentifier
    resourceNameField: DBClusterIdentifier
    passWhen:
      op: equals
      path: IAMDatabaseAuthenticationEnabled
      value: true
    failMessage: Neptune DB cluster does not have IAM database authentication enabled.
    passMessage: Neptune DB cluster has IAM database authentication enabled.
    remediation:
      summary: Enable IAM database authentication on the Neptune cluster.
      steps:
        - Run aws neptune modify-db-cluster with
          --enable-iam-database-authentication for the cluster.
        - Grant the neptune-db:connect IAM permission to the principals that
          need database access.
      verifyCommand: aws neptune describe-db-clusters --region <region> --output json
    compliance: []
    references:
      - https://docs.aws.amazon.com/neptune/latest/userguide/iam-auth.html
  - id: CR-AWS-NEPTUNE-003
    version: 1.0.0
    provider: aws
    service: neptune
    title: Neptune DB cluster exports audit logs to CloudWatch
    description: The Neptune DB cluster exports audit logs to Amazon CloudWatch Logs
      via EnabledCloudwatchLogsExports.
    rationale: Without audit log export, authentication and management-plane events
      on the graph database are not centrally retained, leaving no trail for
      detecting unauthorized access or investigating incidents.
    severity: medium
    categories:
      - logging
      - audit
    source:
      engine: prowler
      id: neptune_cluster_cloudwatch_log_export
      license: Apache-2.0
    collector: aws.neptune.describe_db_clusters
    resourcesPath: DBClusters
    resourceIdField: DBClusterIdentifier
    resourceNameField: DBClusterIdentifier
    passWhen:
      op: contains
      path: EnabledCloudwatchLogsExports
      value: audit
    failMessage: Neptune DB cluster does not export audit logs to CloudWatch.
    passMessage: Neptune DB cluster exports audit logs to CloudWatch.
    remediation:
      summary: Enable audit log export to CloudWatch Logs.
      steps:
        - Enable auditing on the cluster parameter group (set
          neptune_enable_audit_log to 1).
        - Run aws neptune modify-db-cluster with
          --cloudwatch-logs-export-configuration to enable the "audit" log type.
      verifyCommand: aws neptune describe-db-clusters --region <region> --output json
    compliance: []
    references:
      - https://docs.aws.amazon.com/neptune/latest/userguide/cloudwatch-logs.html
  - id: CR-AWS-NEPTUNE-004
    version: 1.0.0
    provider: aws
    service: neptune
    title: Neptune DB cluster retains backups for at least 7 days
    description: The Neptune DB cluster BackupRetentionPeriod is 7 days or more.
    rationale: A short or zero backup retention window limits the ability to restore
      graph data after accidental deletion, corruption, or a ransomware-style
      event, and reduces point-in-time recovery coverage.
    severity: medium
    categories:
      - resilience
      - backup
    source:
      engine: prowler
      id: neptune_cluster_backup_enabled
      license: Apache-2.0
    collector: aws.neptune.describe_db_clusters
    resourcesPath: DBClusters
    resourceIdField: DBClusterIdentifier
    resourceNameField: DBClusterIdentifier
    passWhen:
      op: gte
      path: BackupRetentionPeriod
      value: 7
    failMessage: Neptune DB cluster backup retention period is less than 7 days.
    passMessage: Neptune DB cluster retains backups for at least 7 days.
    remediation:
      summary: Increase the backup retention period to at least 7 days.
      steps:
        - Run aws neptune modify-db-cluster with --backup-retention-period 7 (or
          higher) for the cluster.
      verifyCommand: aws neptune describe-db-clusters --region <region> --output json
    compliance: []
    references:
      - https://docs.aws.amazon.com/neptune/latest/userguide/backup-restore.html
  - id: CR-AWS-NEPTUNE-005
    version: 1.0.0
    provider: aws
    service: neptune
    title: Neptune DB cluster has deletion protection enabled
    description: The Neptune DB cluster has DeletionProtection set to true.
    rationale: Without deletion protection, a Neptune cluster can be deleted with a
      single API call or console action, causing permanent loss of graph data
      through accident or a compromised credential.
    severity: medium
    categories:
      - resilience
    source:
      engine: prowler
      id: neptune_cluster_deletion_protection
      license: Apache-2.0
    collector: aws.neptune.describe_db_clusters
    resourcesPath: DBClusters
    resourceIdField: DBClusterIdentifier
    resourceNameField: DBClusterIdentifier
    passWhen:
      op: equals
      path: DeletionProtection
      value: true
    failMessage: Neptune DB cluster does not have deletion protection enabled.
    passMessage: Neptune DB cluster has deletion protection enabled.
    remediation:
      summary: Enable deletion protection on the Neptune cluster.
      steps:
        - Run aws neptune modify-db-cluster with --deletion-protection for the
          cluster.
      verifyCommand: aws neptune describe-db-clusters --region <region> --output json
    compliance: []
    references:
      - https://docs.aws.amazon.com/neptune/latest/userguide/manage-console-delete-protection.html
  - id: CR-AWS-NEPTUNE-006
    version: 1.0.0
    provider: aws
    service: neptune
    title: Neptune DB cluster is deployed across multiple Availability Zones
    description: The Neptune DB cluster has MultiAZ set to true so replica instances
      span more than one Availability Zone.
    rationale: A single-AZ Neptune cluster has no automatic failover target; an
      Availability Zone outage takes the graph database offline until manual
      recovery, threatening application availability.
    severity: medium
    categories:
      - resilience
      - network
    source:
      engine: prowler
      id: neptune_cluster_multi_az_enabled
      license: Apache-2.0
    collector: aws.neptune.describe_db_clusters
    resourcesPath: DBClusters
    resourceIdField: DBClusterIdentifier
    resourceNameField: DBClusterIdentifier
    passWhen:
      op: equals
      path: MultiAZ
      value: true
    failMessage: Neptune DB cluster is not deployed across multiple Availability Zones.
    passMessage: Neptune DB cluster is deployed across multiple Availability Zones.
    remediation:
      summary: Add a Neptune replica in a second Availability Zone.
      steps:
        - Create a Neptune read replica instance in a different Availability
          Zone from the writer so the cluster becomes Multi-AZ.
      verifyCommand: aws neptune describe-db-clusters --region <region> --output json
    compliance: []
    references:
      - https://docs.aws.amazon.com/neptune/latest/userguide/feature-overview-db-clusters.html
  - id: CR-AWS-NEPTUNE-007
    version: 1.0.0
    provider: aws
    service: neptune
    title: Neptune DB cluster copies tags to snapshots
    description: The Neptune DB cluster has CopyTagsToSnapshot set to true.
    rationale: When tags are not copied to snapshots, snapshots lose the ownership,
      environment, and data-classification metadata used to enforce access,
      lifecycle, and cost-governance policies, weakening control over exported
      copies of graph data.
    severity: low
    categories:
      - resilience
      - governance
    source:
      engine: prowler
      id: neptune_cluster_copy_tags_to_snapshots
      license: Apache-2.0
    collector: aws.neptune.describe_db_clusters
    resourcesPath: DBClusters
    resourceIdField: DBClusterIdentifier
    resourceNameField: DBClusterIdentifier
    passWhen:
      op: equals
      path: CopyTagsToSnapshot
      value: true
    failMessage: Neptune DB cluster does not copy tags to snapshots.
    passMessage: Neptune DB cluster copies tags to snapshots.
    remediation:
      summary: Enable copy-tags-to-snapshot on the Neptune cluster.
      steps:
        - Run aws neptune modify-db-cluster with --copy-tags-to-snapshot for the
          cluster.
      verifyCommand: aws neptune describe-db-clusters --region <region> --output json
    compliance: []
    references:
      - https://docs.aws.amazon.com/neptune/latest/userguide/tagging.html
