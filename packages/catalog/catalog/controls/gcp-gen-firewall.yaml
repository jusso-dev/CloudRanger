controls:
  - id: CR-GCP-FIREWALL-100
    version: 1.0.0
    provider: gcp
    service: firewall
    title: No firewall rule allows SSH (22/tcp) from the internet
    description: >
      No enabled ingress firewall rule permits TCP port 22 from a public source
      range such as 0.0.0.0/0.
    rationale: >
      World-open SSH across a VPC exposes every matching instance to brute force
      and remote exploitation and is a standard initial-access vector.
    severity: high
    categories:
      - network
      - public-exposure
    source:
      engine: prowler
      id: compute_firewall_ssh_access_from_the_internet_allowed
      license: Apache-2.0
    collector: gcp.compute.firewall_rules_list
    resourcesPath: $
    resourceIdField: name
    applicableWhen:
      op: and
      exprs:
        - op: not
          expr:
            op: equals
            path: disabled
            value: true
        - op: equals
          path: direction
          value: INGRESS
    passWhen:
      op: not
      expr:
        op: and
        exprs:
          - op: anyItem
            path: sourceRanges
            condition:
              op: isPublicCidr
              path: $
          - op: anyItem
            path: allowed
            condition:
              op: and
              exprs:
                - op: in
                  path: IPProtocol
                  values:
                    - tcp
                    - all
                - op: or
                  exprs:
                    - op: notExists
                      path: ports
                    - op: portStringIncludes
                      path: ports
                      value: 22
    failMessage: Firewall rule allows SSH (22/tcp) from the internet.
    passMessage: Firewall rule does not open SSH to the internet.
    remediation:
      summary: Restrict SSH sources or use IAP TCP forwarding.
      steps:
        - Prefer Identity-Aware Proxy TCP forwarding for administrative access.
        - Replace 0.0.0.0/0 in sourceRanges with specific trusted CIDRs
          (operator action).
      verifyCommand: gcloud compute firewall-rules list --project <project> --format json
    compliance:
      - framework: cis-gcp-foundation
        version: "3.0"
        controls:
          - "3.6"
    references:
      - https://cloud.google.com/firewall/docs/firewalls
      - https://cloud.google.com/vpc/docs/firewall-rules-logging
