# Log-based metric controls require evidence from both Cloud Logging and Cloud
# Monitoring. The related collector is injected under related.alertPolicies.
controls:
  - id: CR-GCP-LOGGING-113
    version: 1.0.0
    provider: gcp
    service: logging
    title: Audit configuration changes have a log metric and alert
    description: A log-based metric detects audit configuration changes and an alert policy references that metric.
    rationale: Changes to audit configuration can create undetected logging blind spots.
    severity: medium
    categories: [logging, detection]
    source:
      {
        engine: prowler,
        id: logging_log_metric_filter_and_alert_for_audit_configuration_changes_enabled,
        license: Apache-2.0,
      }
    collector: gcp.logging.metrics_list
    relatedCollectors: [{ collector: gcp.monitoring.alert_policies_list, as: alertPolicies }]
    aggregate: true
    resourceIdField: $scope
    passWhen:
      {
        op: anyItemReferencedBy,
        itemsPath: primary,
        itemCondition:
          {
            op: contains,
            path: filter,
            value: 'protoPayload.methodName="SetIamPolicy" AND protoPayload.serviceData.policyDelta.auditConfigDeltas:*',
          },
        itemValuePath: name,
        relatedPath: related.alertPolicies,
      }
    onError:
      [
        {
          contains: SERVICE_DISABLED,
          status: fail,
          message: Logging or Monitoring API is disabled; the required metric and alert cannot be verified.,
        },
      ]
    failMessage: No audit-configuration-change metric is referenced by an alert policy.
    passMessage: An audit-configuration-change metric is referenced by an alert policy.
    remediation:
      {
        summary: Create an audit-configuration log metric and alert policy,
        steps:
          [
            Create a log-based metric for audit configuration changes.,
            Create an alert policy whose condition references that metric.,
          ],
        verifyCommand: gcloud logging metrics list --project <project> --format json,
      }
    compliance: [{ framework: cis-gcp-foundations, version: "2.0", controls: ["2.4"] }]
    references:
      [
        https://cloud.google.com/logging/docs/logs-based-metrics,
        https://cloud.google.com/monitoring/alerts,
      ]
