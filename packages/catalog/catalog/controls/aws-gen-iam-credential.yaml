controls:
  - id: CR-AWS-IAM-025
    version: 1.0.0
    provider: aws
    service: iam
    title: Root account credentials have not been used recently
    description: The root account's password and access keys show no use within
      the last day in the IAM credential report.
    rationale: The root user has unrestricted access and its use cannot be
      constrained by IAM policy. Routine root usage indicates day-to-day
      administration is happening outside role-based access, defeating MFA
      protections, auditing boundaries, and least privilege.
    severity: high
    categories:
      - identity
      - least-privilege
    source:
      engine: prowler
      id: iam_avoid_root_usage
      license: Apache-2.0
    collector: aws.iam.get_credential_report
    resourcesPath: $
    resourceIdField: arn
    resourceNameField: user
    applicableWhen:
      op: equals
      path: user
      value: <root_account>
    passWhen:
      op: and
      exprs:
        - op: not
          expr: { op: daysSinceLt, path: password_last_used, value: 1 }
        - op: not
          expr: { op: daysSinceLt, path: access_key_1_last_used_date, value: 1 }
        - op: not
          expr: { op: daysSinceLt, path: access_key_2_last_used_date, value: 1 }
    failMessage: Root account credentials were used within the last day.
    passMessage: Root account credentials show no recent use.
    remediation:
      summary: Stop using the root user for daily work; use IAM Identity Center
        or IAM roles with MFA instead.
      steps:
        - Identify why root was used (check CloudTrail for root API activity).
        - Move the activity to an IAM role or IAM Identity Center permission set.
        - Lock root credentials away (hardware MFA, no access keys, vaulted password).
      verifyCommand: aws iam get-credential-report --output json
    compliance:
      - framework: cis-aws-foundations
        version: "3.0"
        controls: ["1.7"]
      - framework: nist-csf
        controls: [PR.AC]
    references:
      - https://docs.aws.amazon.com/IAM/latest/UserGuide/id_root-user.html

  - id: CR-AWS-IAM-026
    version: 1.0.0
    provider: aws
    service: iam
    title: Active access keys have been used within 45 days
    description: No IAM user has an active access key whose last recorded use is
      more than 45 days ago, according to the IAM credential report.
    rationale: Active but unused access keys are standing credentials nobody is
      watching. They widen the blast radius of a leak while providing no
      operational value, and are prime targets for quiet abuse.
    severity: medium
    categories:
      - identity
      - credential-hygiene
    source:
      engine: prowler
      id: iam_user_accesskey_unused
      license: Apache-2.0
    collector: aws.iam.get_credential_report
    resourcesPath: $
    resourceIdField: arn
    resourceNameField: user
    applicableWhen:
      op: notEquals
      path: user
      value: <root_account>
    passWhen:
      op: and
      exprs:
        - op: or
          exprs:
            - { op: equals, path: access_key_1_active, value: "false" }
            - op: not
              expr: { op: daysSinceGt, path: access_key_1_last_used_date, value: 45 }
        - op: or
          exprs:
            - { op: equals, path: access_key_2_active, value: "false" }
            - op: not
              expr: { op: daysSinceGt, path: access_key_2_last_used_date, value: 45 }
    failMessage: User has an active access key unused for more than 45 days.
    passMessage: All active access keys were used within the last 45 days.
    remediation:
      summary: Deactivate and remove access keys that are no longer used.
      steps:
        - Confirm the key is unused via the credential report and CloudTrail.
        - Deactivate the key (aws iam update-access-key --status Inactive).
        - Delete the key after a soak period with no breakage.
      verifyCommand: aws iam get-credential-report --output json
    compliance:
      - framework: cis-aws-foundations
        version: "3.0"
        controls: ["1.12"]
      - framework: nist-csf
        controls: [PR.AC]
    references:
      - https://docs.aws.amazon.com/IAM/latest/UserGuide/id_credentials_finding-unused.html

  - id: CR-AWS-IAM-027
    version: 1.0.0
    provider: aws
    service: iam
    title: Console passwords are disabled or recently used
    description: Every IAM user either has console access disabled, has never
      signed in, or has signed in within the last 45 days, according to the IAM
      credential report.
    rationale: A console password that exists but sits unused for weeks belongs
      to someone who does not need it — or to no one at all. Dormant console
      access is an unwatched door into the account.
    severity: medium
    categories:
      - identity
      - credential-hygiene
    source:
      engine: prowler
      id: iam_user_console_access_unused
      license: Apache-2.0
    collector: aws.iam.get_credential_report
    resourcesPath: $
    resourceIdField: arn
    resourceNameField: user
    applicableWhen:
      op: notEquals
      path: user
      value: <root_account>
    passWhen:
      op: or
      exprs:
        - { op: equals, path: password_enabled, value: "false" }
        - op: not
          expr: { op: daysSinceGt, path: password_last_used, value: 45 }
    failMessage: User's console password has not been used for more than 45 days.
    passMessage: Console access is disabled, never used, or recently used.
    remediation:
      summary: Remove console passwords from users who do not sign in.
      steps:
        - Confirm inactivity via the credential report.
        - Delete the login profile (aws iam delete-login-profile --user-name <user>).
        - Prefer federated access (IAM Identity Center) over long-lived IAM passwords.
      verifyCommand: aws iam get-credential-report --output json
    compliance:
      - framework: cis-aws-foundations
        version: "3.0"
        controls: ["1.12"]
      - framework: nist-csf
        controls: [PR.AC]
    references:
      - https://docs.aws.amazon.com/IAM/latest/UserGuide/id_credentials_finding-unused.html

  - id: CR-AWS-IAM-028
    version: 1.0.0
    provider: aws
    service: iam
    title: No active access keys that have never been used
    description: No IAM user has an active access key with no recorded use in
      the IAM credential report.
    rationale: Access keys created at user setup and never used are pure
      liability — standing credentials with zero operational purpose. They
      typically come from the console's "create key at user creation" flow.
    severity: medium
    categories:
      - identity
      - credential-hygiene
    source:
      engine: prowler
      id: iam_user_no_setup_initial_access_key
      license: Apache-2.0
    collector: aws.iam.get_credential_report
    resourcesPath: $
    resourceIdField: arn
    resourceNameField: user
    applicableWhen:
      op: notEquals
      path: user
      value: <root_account>
    passWhen:
      op: and
      exprs:
        - op: or
          exprs:
            - { op: equals, path: access_key_1_active, value: "false" }
            - op: notIn
              path: access_key_1_last_used_date
              values: ["N/A", "no_information"]
        - op: or
          exprs:
            - { op: equals, path: access_key_2_active, value: "false" }
            - op: notIn
              path: access_key_2_last_used_date
              values: ["N/A", "no_information"]
    failMessage: User has an active access key that has never been used.
    passMessage: No active never-used access keys.
    remediation:
      summary: Delete access keys that were created but never used.
      steps:
        - Confirm the key has no recorded use in the credential report.
        - Deactivate then delete the key.
        - Create keys only when there is an immediate, concrete need.
      verifyCommand: aws iam get-credential-report --output json
    compliance:
      - framework: cis-aws-foundations
        version: "3.0"
        controls: ["1.11"]
      - framework: nist-csf
        controls: [PR.AC]
    references:
      - https://docs.aws.amazon.com/IAM/latest/UserGuide/id_credentials_access-keys.html

  - id: CR-AWS-IAM-029
    version: 1.0.0
    provider: aws
    service: iam
    title: Users do not have two active access keys
    description: No IAM user has both access key slots active at the same time,
      according to the IAM credential report.
    rationale: Two simultaneously active keys usually means a rotation that was
      never finished. The old key keeps working indefinitely, doubling the
      credential surface for that identity.
    severity: medium
    categories:
      - identity
      - credential-hygiene
    source:
      engine: prowler
      id: iam_user_two_active_access_key
      license: Apache-2.0
    collector: aws.iam.get_credential_report
    resourcesPath: $
    resourceIdField: arn
    resourceNameField: user
    applicableWhen:
      op: notEquals
      path: user
      value: <root_account>
    passWhen:
      op: not
      expr:
        op: and
        exprs:
          - { op: equals, path: access_key_1_active, value: "true" }
          - { op: equals, path: access_key_2_active, value: "true" }
    failMessage: User has two active access keys.
    passMessage: User has at most one active access key.
    remediation:
      summary: Finish key rotations — deactivate and delete the superseded key.
      steps:
        - Identify which key is current (last-used dates in the credential report).
        - Deactivate the older key and monitor for breakage.
        - Delete the deactivated key.
      verifyCommand: aws iam get-credential-report --output json
    compliance:
      - framework: cis-aws-foundations
        version: "3.0"
        controls: ["1.13"]
      - framework: nist-csf
        controls: [PR.AC]
    references:
      - https://docs.aws.amazon.com/IAM/latest/UserGuide/id_credentials_access-keys.html
