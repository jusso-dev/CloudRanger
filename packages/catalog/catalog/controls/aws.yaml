# AWS posture controls. Logic ported from Prowler (Apache-2.0) check
# implementations; CloudRanger evaluates the same conditions against
# AWS CLI JSON output instead of SDK responses. Source attribution on
# every control. CIS control numbers reference CIS AWS Foundations
# Benchmark v3.0 section identifiers only (no benchmark text is included).
controls:
  - id: CR-AWS-IAM-001
    version: 1.0.0
    provider: aws
    service: iam
    title: Root account has MFA enabled
    description: >
      Verifies the account root user has multi-factor authentication enabled,
      using the IAM account summary.
    rationale: >
      The root user has unrestricted access to the account. Compromise of a
      root password without MFA gives an attacker full control of every
      resource and billing surface.
    severity: critical
    categories: [identity, mfa]
    source: { engine: prowler, id: iam_root_mfa_enabled, license: Apache-2.0 }
    collector: aws.iam.get_account_summary
    resourceIdField: $scope
    passWhen: { op: equals, path: SummaryMap.AccountMFAEnabled, value: 1 }
    failMessage: Root account does not have MFA enabled.
    passMessage: Root account has MFA enabled.
    remediation:
      summary: Enable MFA (preferably a hardware key) for the root user.
      steps:
        - Sign in to the AWS console as the root user.
        - Open IAM > Security credentials and assign an MFA device.
        - Prefer a FIDO2 hardware key; store recovery material offline.
      verifyCommand: aws iam get-account-summary --output json
    compliance:
      - { framework: cis-aws-foundations, version: "3.0", controls: ["1.5"] }
      - { framework: nist-csf, controls: [PR.AA] }
    references:
      - https://docs.aws.amazon.com/IAM/latest/UserGuide/enable-mfa-for-root.html

  - id: CR-AWS-IAM-002
    version: 1.0.0
    provider: aws
    service: iam
    title: Root account has no access keys
    description: Verifies no programmatic access keys exist for the root user.
    rationale: >
      Root access keys are long-lived credentials with unlimited privilege and
      no way to scope them down. They should never exist.
    severity: critical
    categories: [identity, credentials]
    source: { engine: prowler, id: iam_no_root_access_key, license: Apache-2.0 }
    collector: aws.iam.get_account_summary
    resourceIdField: $scope
    passWhen: { op: equals, path: SummaryMap.AccountAccessKeysPresent, value: 0 }
    failMessage: Root account has one or more access keys.
    passMessage: Root account has no access keys.
    remediation:
      summary: Delete all root access keys and use IAM identities instead.
      steps:
        - Identify workloads using the root keys (check CloudTrail).
        - Migrate them to IAM roles or users with scoped policies.
        - Delete the root access keys in IAM > Security credentials.
      verifyCommand: aws iam get-account-summary --output json
    compliance:
      - { framework: cis-aws-foundations, version: "3.0", controls: ["1.4"] }
    references:
      - https://docs.aws.amazon.com/IAM/latest/UserGuide/id_root-user.html

  - id: CR-AWS-IAM-003
    version: 1.1.0
    provider: aws
    service: iam
    title: Password policy requires minimum length of 14
    description: Verifies the account password policy enforces at least 14 characters.
    rationale: >
      Short passwords materially reduce the cost of brute-force and credential
      stuffing attacks against console users.
    severity: medium
    categories: [identity, credentials]
    source: { engine: prowler, id: iam_password_policy_minimum_length_14, license: Apache-2.0 }
    collector: aws.iam.get_account_password_policy
    resourceIdField: $scope
    parameters:
      minimumPasswordLength:
        type: number
        description: Minimum console password length the policy must enforce.
        default: 14
        min: 8
        max: 128
    passWhen:
      op: gte
      path: PasswordPolicy.MinimumPasswordLength
      value: { $param: minimumPasswordLength }
    onError:
      - contains: NoSuchEntity
        status: fail
        message: No account password policy is configured.
    failMessage: Password policy does not require at least 14 characters.
    passMessage: Password policy requires at least 14 characters.
    remediation:
      summary: Set the IAM account password policy minimum length to 14 or more.
      steps:
        - Open IAM > Account settings and edit the password policy.
        - Set minimum length to 14 and enable complexity requirements.
      verifyCommand: aws iam get-account-password-policy --output json
    compliance:
      - { framework: cis-aws-foundations, version: "3.0", controls: ["1.8"] }
    references:
      - https://docs.aws.amazon.com/IAM/latest/UserGuide/id_credentials_passwords_account-policy.html

  - id: CR-AWS-IAM-004
    version: 1.0.0
    provider: aws
    service: iam
    title: IAM user has MFA enabled
    description: Verifies each IAM user has at least one MFA device registered.
    rationale: >
      Users without MFA are vulnerable to credential phishing and password
      reuse; a single stolen password grants their full permissions.
    severity: high
    categories: [identity, mfa]
    source: { engine: prowler, id: iam_user_mfa_enabled_console_access, license: Apache-2.0 }
    collector: aws.iam.list_mfa_devices
    resourceIdField: $resourceKey
    passWhen: { op: lengthGt, path: MFADevices, value: 0 }
    failMessage: IAM user has no MFA device registered.
    passMessage: IAM user has at least one MFA device.
    remediation:
      summary: Register an MFA device for the user, or remove console access.
      steps:
        - Confirm whether the user needs console access at all.
        - If yes, require the user to register a virtual or hardware MFA device.
        - If the user is service-only, remove the login profile.
      verifyCommand: aws iam list-mfa-devices --user-name <user> --output json
    compliance:
      - { framework: cis-aws-foundations, version: "3.0", controls: ["1.10"] }
    references:
      - https://docs.aws.amazon.com/IAM/latest/UserGuide/id_credentials_mfa.html

  - id: CR-AWS-IAM-005
    version: 1.1.0
    provider: aws
    service: iam
    title: No active access keys older than 90 days
    description: Verifies each IAM user has no active access key created more than 90 days ago.
    rationale: >
      Long-lived static keys accumulate exposure: they leak into code, logs and
      laptops. Rotation bounds the window of usefulness of a leaked key.
    severity: medium
    categories: [identity, credentials]
    source: { engine: prowler, id: iam_rotate_access_key_90_days, license: Apache-2.0 }
    collector: aws.iam.list_access_keys
    resourceIdField: $resourceKey
    parameters:
      maxKeyAgeDays:
        type: number
        description: Maximum age in days for an active access key before it must be rotated.
        default: 90
        min: 1
        max: 365
    passWhen:
      op: noneItem
      path: AccessKeyMetadata
      condition:
        op: and
        exprs:
          - { op: equals, path: Status, value: Active }
          - { op: daysSinceGt, path: CreateDate, value: { $param: maxKeyAgeDays } }
    failMessage: User has an active access key older than 90 days.
    passMessage: No active access keys older than 90 days.
    remediation:
      summary: Rotate the access key and prefer short-lived role credentials.
      steps:
        - Create a new access key and migrate the workload to it.
        - Deactivate, verify nothing breaks, then delete the old key.
        - Prefer IAM roles / Identity Center over static keys entirely.
      verifyCommand: aws iam list-access-keys --user-name <user> --output json
    compliance:
      - { framework: cis-aws-foundations, version: "3.0", controls: ["1.14"] }
    references:
      - https://docs.aws.amazon.com/IAM/latest/UserGuide/id_credentials_access-keys.html

  - id: CR-AWS-S3-001
    version: 1.0.0
    provider: aws
    service: s3
    title: S3 bucket blocks all public access
    description: >
      Verifies all four bucket-level public access block settings are enabled
      for each bucket.
    rationale: >
      Public object storage is the most common cause of large-scale cloud data
      exposure. The public access block is the authoritative bucket-level
      guardrail.
    severity: high
    categories: [storage, public-exposure]
    source: { engine: prowler, id: s3_bucket_public_access_block, license: Apache-2.0 }
    collector: aws.s3.get_public_access_block
    resourceIdField: $resourceKey
    passWhen:
      op: and
      exprs:
        - { op: equals, path: PublicAccessBlockConfiguration.BlockPublicAcls, value: true }
        - { op: equals, path: PublicAccessBlockConfiguration.IgnorePublicAcls, value: true }
        - { op: equals, path: PublicAccessBlockConfiguration.BlockPublicPolicy, value: true }
        - { op: equals, path: PublicAccessBlockConfiguration.RestrictPublicBuckets, value: true }
    onError:
      - contains: NoSuchPublicAccessBlockConfiguration
        status: fail
        message: Bucket has no public access block configuration.
      - contains: AccessDenied
        status: error
    failMessage: Bucket does not enable all four public access block settings.
    passMessage: Bucket blocks all public access.
    remediation:
      summary: Enable all four public access block settings on the bucket.
      steps:
        - Confirm the bucket is not intentionally serving public content.
        - Enable BlockPublicAcls, IgnorePublicAcls, BlockPublicPolicy and RestrictPublicBuckets.
        - Consider enabling the account-level public access block as well.
      verifyCommand: aws s3api get-public-access-block --bucket <bucket> --output json
    compliance:
      - { framework: cis-aws-foundations, version: "3.0", controls: ["2.1.4"] }
      - { framework: nist-csf, controls: [PR.DS] }
    references:
      - https://docs.aws.amazon.com/AmazonS3/latest/userguide/access-control-block-public-access.html

  - id: CR-AWS-S3-002
    version: 1.0.0
    provider: aws
    service: s3
    title: S3 bucket has default encryption
    description: Verifies each bucket has a default server-side encryption configuration.
    rationale: >
      Default encryption guarantees objects at rest are encrypted even when
      uploads omit encryption headers.
    severity: medium
    categories: [storage, encryption]
    source: { engine: prowler, id: s3_bucket_default_encryption, license: Apache-2.0 }
    collector: aws.s3.get_bucket_encryption
    resourceIdField: $resourceKey
    passWhen:
      op: anyItem
      path: ServerSideEncryptionConfiguration.Rules
      condition: { op: exists, path: ApplyServerSideEncryptionByDefault.SSEAlgorithm }
    onError:
      - contains: ServerSideEncryptionConfigurationNotFoundError
        status: fail
        message: Bucket has no default encryption configuration.
      - contains: AccessDenied
        status: error
    failMessage: Bucket has no default server-side encryption.
    passMessage: Bucket has default server-side encryption.
    remediation:
      summary: Enable default SSE (SSE-S3 or SSE-KMS) on the bucket.
      steps:
        - Enable default encryption with aws:kms or AES256.
        - Prefer SSE-KMS with a customer-managed key for sensitive data.
      verifyCommand: aws s3api get-bucket-encryption --bucket <bucket> --output json
    compliance:
      - { framework: nist-csf, controls: [PR.DS] }
    references:
      - https://docs.aws.amazon.com/AmazonS3/latest/userguide/bucket-encryption.html

  - id: CR-AWS-S3-003
    version: 1.0.0
    provider: aws
    service: s3
    title: S3 bucket has versioning enabled
    description: Verifies object versioning is enabled on each bucket.
    rationale: >
      Versioning protects against accidental deletion and ransomware-style
      overwrite, and underpins recovery for critical data.
    severity: medium
    categories: [storage, resilience]
    source: { engine: prowler, id: s3_bucket_object_versioning, license: Apache-2.0 }
    collector: aws.s3.get_bucket_versioning
    resourceIdField: $resourceKey
    passWhen: { op: equals, path: Status, value: Enabled }
    failMessage: Bucket versioning is not enabled.
    passMessage: Bucket versioning is enabled.
    remediation:
      summary: Enable versioning on the bucket.
      steps:
        - Enable versioning; add lifecycle rules to expire old versions if cost matters.
      verifyCommand: aws s3api get-bucket-versioning --bucket <bucket> --output json
    compliance:
      - { framework: nist-csf, controls: [PR.DS] }
    references:
      - https://docs.aws.amazon.com/AmazonS3/latest/userguide/Versioning.html

  - id: CR-AWS-EC2-001
    version: 1.0.0
    provider: aws
    service: ec2
    title: No security group allows SSH from the internet
    description: >
      Verifies no security group has an ingress rule permitting TCP port 22
      from 0.0.0.0/0 or ::/0.
    rationale: >
      World-reachable SSH invites credential brute forcing and is a standard
      initial access vector. Administrative access should come via VPN, SSM or
      allowlisted ranges.
    severity: high
    categories: [network, public-exposure]
    source:
      engine: prowler
      id: ec2_securitygroup_allow_ingress_from_internet_to_tcp_port_22
      license: Apache-2.0
    collector: aws.ec2.describe_security_groups
    resourcesPath: SecurityGroups
    resourceIdField: GroupId
    resourceNameField: GroupName
    passWhen:
      op: noneItem
      path: IpPermissions
      condition:
        op: and
        exprs:
          - { op: portIncludes, fromPath: FromPort, toPath: ToPort, value: 22 }
          - op: or
            exprs:
              - { op: anyItem, path: IpRanges, condition: { op: isPublicCidr, path: CidrIp } }
              - { op: anyItem, path: Ipv6Ranges, condition: { op: isPublicCidr, path: CidrIpv6 } }
    failMessage: Security group allows SSH (22/tcp) from the internet.
    passMessage: No internet-open SSH ingress.
    remediation:
      summary: Restrict port 22 ingress to known ranges or remove it.
      steps:
        - Identify who actually needs SSH; prefer SSM Session Manager.
        - Replace 0.0.0.0/0 with specific CIDR ranges or a security group source.
      verifyCommand: aws ec2 describe-security-groups --region <region> --output json
    compliance:
      - { framework: cis-aws-foundations, version: "3.0", controls: ["5.2"] }
    references:
      - https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/security-group-rules.html

  - id: CR-AWS-EC2-002
    version: 1.0.0
    provider: aws
    service: ec2
    title: No security group allows RDP from the internet
    description: >
      Verifies no security group has an ingress rule permitting TCP port 3389
      from 0.0.0.0/0 or ::/0.
    rationale: >
      Internet-exposed RDP is heavily scanned and exploited (brute force,
      ransomware operators). It should never be world-open.
    severity: high
    categories: [network, public-exposure]
    source:
      engine: prowler
      id: ec2_securitygroup_allow_ingress_from_internet_to_tcp_port_3389
      license: Apache-2.0
    collector: aws.ec2.describe_security_groups
    resourcesPath: SecurityGroups
    resourceIdField: GroupId
    resourceNameField: GroupName
    passWhen:
      op: noneItem
      path: IpPermissions
      condition:
        op: and
        exprs:
          - { op: portIncludes, fromPath: FromPort, toPath: ToPort, value: 3389 }
          - op: or
            exprs:
              - { op: anyItem, path: IpRanges, condition: { op: isPublicCidr, path: CidrIp } }
              - { op: anyItem, path: Ipv6Ranges, condition: { op: isPublicCidr, path: CidrIpv6 } }
    failMessage: Security group allows RDP (3389/tcp) from the internet.
    passMessage: No internet-open RDP ingress.
    remediation:
      summary: Restrict port 3389 ingress to known ranges or remove it.
      steps:
        - Prefer SSM Fleet Manager or a bastion behind VPN for Windows access.
        - Replace 0.0.0.0/0 with specific source ranges.
      verifyCommand: aws ec2 describe-security-groups --region <region> --output json
    compliance:
      - { framework: cis-aws-foundations, version: "3.0", controls: ["5.3"] }
    references:
      - https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/security-group-rules.html

  - id: CR-AWS-EC2-003
    version: 1.0.0
    provider: aws
    service: ec2
    title: EBS encryption by default is enabled
    description: Verifies the region has EBS encryption-by-default turned on.
    rationale: >
      Encryption-by-default guarantees new volumes and snapshots are encrypted
      without relying on every template and operator remembering to set it.
    severity: medium
    categories: [encryption, compute]
    source: { engine: prowler, id: ec2_ebs_default_encryption, license: Apache-2.0 }
    collector: aws.ec2.get_ebs_encryption_by_default
    resourceIdField: $scope
    passWhen: { op: equals, path: EbsEncryptionByDefault, value: true }
    failMessage: EBS encryption by default is disabled in this region.
    passMessage: EBS encryption by default is enabled.
    remediation:
      summary: Enable EBS encryption by default in each active region.
      steps:
        - Enable encryption-by-default per region (console or API).
        - Optionally set a customer-managed KMS key as the default.
      verifyCommand: aws ec2 get-ebs-encryption-by-default --region <region> --output json
    compliance:
      - { framework: cis-aws-foundations, version: "3.0", controls: ["2.2.1"] }
    references:
      - https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/EBSEncryption.html

  - id: CR-AWS-EC2-004
    version: 1.0.0
    provider: aws
    service: ec2
    title: EC2 instance requires IMDSv2
    description: >
      Verifies each running instance enforces IMDSv2 (HttpTokens=required) on
      the instance metadata service.
    rationale: >
      IMDSv1 allows SSRF vulnerabilities in workloads to be escalated into
      credential theft of the instance role. IMDSv2 session tokens block that
      class of attack.
    severity: high
    categories: [compute, identity]
    source: { engine: prowler, id: ec2_instance_imdsv2_enabled, license: Apache-2.0 }
    collector: aws.ec2.describe_instances
    resourcesPath: Reservations[].Instances
    resourceIdField: InstanceId
    applicableWhen:
      op: notIn
      path: State.Name
      values: [terminated, shutting-down]
    passWhen: { op: equals, path: MetadataOptions.HttpTokens, value: required }
    failMessage: Instance does not enforce IMDSv2.
    passMessage: Instance enforces IMDSv2.
    remediation:
      summary: Require IMDSv2 on the instance and its launch template.
      steps:
        - Run modify-instance-metadata-options with HttpTokens=required (change window advised).
        - Update launch templates / ASGs so new instances inherit the setting.
      verifyCommand: aws ec2 describe-instances --region <region> --output json
    compliance:
      - { framework: cis-aws-foundations, version: "3.0", controls: ["5.6"] }
    references:
      - https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/configuring-instance-metadata-service.html

  - id: CR-AWS-CLOUDTRAIL-001
    version: 1.0.0
    provider: aws
    service: cloudtrail
    title: A multi-region CloudTrail trail exists
    description: Verifies at least one trail is configured as multi-region.
    rationale: >
      Without a multi-region trail, activity in unused regions is invisible —
      exactly where attackers like to operate.
    severity: high
    categories: [logging]
    source: { engine: prowler, id: cloudtrail_multi_region_enabled, license: Apache-2.0 }
    collector: aws.cloudtrail.describe_trails
    resourceIdField: $scope
    passWhen:
      op: anyItem
      path: trailList
      condition: { op: equals, path: IsMultiRegionTrail, value: true }
    failMessage: No multi-region CloudTrail trail exists.
    passMessage: A multi-region trail exists.
    remediation:
      summary: Create or convert a trail to multi-region.
      steps:
        - Create an organisation or account trail with multi-region enabled.
        - Send logs to a dedicated, access-controlled S3 bucket.
      verifyCommand: aws cloudtrail describe-trails --output json
    compliance:
      - { framework: cis-aws-foundations, version: "3.0", controls: ["3.1"] }
    references:
      - https://docs.aws.amazon.com/awscloudtrail/latest/userguide/receive-cloudtrail-log-files-from-multiple-regions.html

  - id: CR-AWS-CLOUDTRAIL-002
    version: 1.0.0
    provider: aws
    service: cloudtrail
    title: CloudTrail log file validation is enabled
    description: Verifies each trail has log file integrity validation enabled.
    rationale: >
      Log file validation makes tampering with delivered log files detectable,
      preserving evidentiary value after an incident.
    severity: medium
    categories: [logging, integrity]
    source: { engine: prowler, id: cloudtrail_log_file_validation_enabled, license: Apache-2.0 }
    collector: aws.cloudtrail.describe_trails
    resourcesPath: trailList
    resourceIdField: TrailARN
    resourceNameField: Name
    passWhen: { op: equals, path: LogFileValidationEnabled, value: true }
    failMessage: Trail does not have log file validation enabled.
    passMessage: Trail has log file validation enabled.
    remediation:
      summary: Enable log file validation on the trail.
      steps:
        - Update the trail with --enable-log-file-validation (mutating; operator action).
      verifyCommand: aws cloudtrail describe-trails --output json
    compliance:
      - { framework: cis-aws-foundations, version: "3.0", controls: ["3.2"] }
    references:
      - https://docs.aws.amazon.com/awscloudtrail/latest/userguide/cloudtrail-log-file-validation-intro.html

  - id: CR-AWS-CLOUDTRAIL-003
    version: 1.0.0
    provider: aws
    service: cloudtrail
    title: CloudTrail trail is actively logging
    description: Verifies each trail's status reports IsLogging=true.
    rationale: >
      A configured but stopped trail provides false comfort — no events are
      being recorded.
    severity: high
    categories: [logging]
    source:
      {
        engine: prowler,
        id: cloudtrail_multi_region_enabled_logging_management_events,
        license: Apache-2.0,
      }
    collector: aws.cloudtrail.get_trail_status
    resourceIdField: $resourceKey
    passWhen: { op: equals, path: IsLogging, value: true }
    failMessage: Trail exists but is not logging.
    passMessage: Trail is logging.
    remediation:
      summary: Start logging on the trail and alert on StopLogging events.
      steps:
        - Start the trail (operator action) and investigate why it stopped.
        - Add an EventBridge alert on cloudtrail:StopLogging.
      verifyCommand: aws cloudtrail get-trail-status --name <trail-arn> --output json
    compliance:
      - { framework: cis-aws-foundations, version: "3.0", controls: ["3.1"] }
    references:
      - https://docs.aws.amazon.com/awscloudtrail/latest/userguide/cloudtrail-additional-cli-commands.html

  - id: CR-AWS-RDS-001
    version: 1.0.0
    provider: aws
    service: rds
    title: RDS instance is not publicly accessible
    description: Verifies no RDS instance has PubliclyAccessible enabled.
    rationale: >
      Databases reachable from the internet are one credential or CVE away
      from full data compromise.
    severity: critical
    categories: [database, public-exposure]
    source: { engine: prowler, id: rds_instance_no_public_access, license: Apache-2.0 }
    collector: aws.rds.describe_db_instances
    resourcesPath: DBInstances
    resourceIdField: DBInstanceIdentifier
    passWhen: { op: not, expr: { op: equals, path: PubliclyAccessible, value: true } }
    failMessage: RDS instance is publicly accessible.
    passMessage: RDS instance is not publicly accessible.
    remediation:
      summary: Disable public accessibility and access via VPC networking.
      steps:
        - Confirm no external integration depends on the public endpoint.
        - Modify the instance to PubliclyAccessible=false (brief interruption possible).
        - Restrict the security group to application subnets.
      verifyCommand: aws rds describe-db-instances --region <region> --output json
    compliance:
      - { framework: cis-aws-foundations, version: "3.0", controls: ["2.3.3"] }
    references:
      - https://docs.aws.amazon.com/AmazonRDS/latest/UserGuide/USER_VPC.html

  - id: CR-AWS-RDS-002
    version: 1.0.0
    provider: aws
    service: rds
    title: RDS storage is encrypted
    description: Verifies each RDS instance has storage encryption enabled.
    rationale: >
      Unencrypted database storage exposes data through snapshots, backups and
      decommissioned media.
    severity: high
    categories: [database, encryption]
    source: { engine: prowler, id: rds_instance_storage_encrypted, license: Apache-2.0 }
    collector: aws.rds.describe_db_instances
    resourcesPath: DBInstances
    resourceIdField: DBInstanceIdentifier
    passWhen: { op: equals, path: StorageEncrypted, value: true }
    failMessage: RDS instance storage is not encrypted.
    passMessage: RDS instance storage is encrypted.
    remediation:
      summary: Recreate the instance from an encrypted snapshot copy.
      steps:
        - Snapshot the instance, copy the snapshot with encryption, restore.
        - Plan cutover; encryption cannot be enabled in place.
      verifyCommand: aws rds describe-db-instances --region <region> --output json
    compliance:
      - { framework: cis-aws-foundations, version: "3.0", controls: ["2.3.1"] }
    references:
      - https://docs.aws.amazon.com/AmazonRDS/latest/UserGuide/Overview.Encryption.html

  - id: CR-AWS-RDS-003
    version: 1.0.0
    provider: aws
    service: rds
    title: RDS automated backups are enabled
    description: Verifies each RDS instance has a backup retention period greater than zero.
    rationale: >
      Without automated backups there is no point-in-time recovery from
      corruption, deletion or ransomware.
    severity: high
    categories: [database, resilience]
    source: { engine: prowler, id: rds_instance_backup_enabled, license: Apache-2.0 }
    collector: aws.rds.describe_db_instances
    resourcesPath: DBInstances
    resourceIdField: DBInstanceIdentifier
    passWhen: { op: gt, path: BackupRetentionPeriod, value: 0 }
    failMessage: RDS instance has automated backups disabled.
    passMessage: RDS instance has automated backups enabled.
    remediation:
      summary: Set a backup retention period (7+ days recommended).
      steps:
        - Modify the instance backup retention to at least 7 days.
      verifyCommand: aws rds describe-db-instances --region <region> --output json
    compliance:
      - { framework: nist-csf, controls: [PR.IP] }
    references:
      - https://docs.aws.amazon.com/AmazonRDS/latest/UserGuide/USER_WorkingWithAutomatedBackups.html

  - id: CR-AWS-RDS-004
    version: 1.0.0
    provider: aws
    service: rds
    title: RDS deletion protection is enabled
    description: Verifies each RDS instance has deletion protection enabled.
    rationale: >
      Deletion protection prevents accidental or malicious single-call
      destruction of production databases.
    severity: medium
    categories: [database, resilience]
    source: { engine: prowler, id: rds_instance_deletion_protection, license: Apache-2.0 }
    collector: aws.rds.describe_db_instances
    resourcesPath: DBInstances
    resourceIdField: DBInstanceIdentifier
    passWhen: { op: equals, path: DeletionProtection, value: true }
    failMessage: RDS instance does not have deletion protection.
    passMessage: RDS instance has deletion protection.
    remediation:
      summary: Enable deletion protection on production instances.
      steps:
        - Modify the instance with --deletion-protection.
      verifyCommand: aws rds describe-db-instances --region <region> --output json
    compliance:
      - { framework: nist-csf, controls: [PR.IP] }
    references:
      - https://docs.aws.amazon.com/AmazonRDS/latest/UserGuide/USER_DeleteInstance.html

  - id: CR-AWS-KMS-001
    version: 1.0.0
    provider: aws
    service: kms
    title: KMS key rotation is enabled
    description: Verifies automatic rotation is enabled for KMS keys.
    rationale: >
      Rotation limits the blast radius of a compromised key and is a baseline
      cryptographic hygiene control.
    severity: medium
    categories: [encryption, keys]
    source: { engine: prowler, id: kms_cmk_rotation_enabled, license: Apache-2.0 }
    collector: aws.kms.get_key_rotation_status
    resourceIdField: $resourceKey
    passWhen: { op: equals, path: KeyRotationEnabled, value: true }
    onError:
      - contains: AccessDeniedException
        status: not_applicable
        message: Rotation status not readable (typically an AWS-managed or cross-account key).
      - contains: UnsupportedOperationException
        status: not_applicable
        message: Key type does not support automatic rotation (e.g. asymmetric).
    failMessage: KMS key does not have automatic rotation enabled.
    passMessage: KMS key rotation is enabled.
    remediation:
      summary: Enable automatic rotation for customer-managed keys.
      steps:
        - Enable rotation (operator action) for each customer-managed symmetric key.
      verifyCommand: aws kms get-key-rotation-status --key-id <key-id> --region <region> --output json
    compliance:
      - { framework: cis-aws-foundations, version: "3.0", controls: ["3.6"] }
    references:
      - https://docs.aws.amazon.com/kms/latest/developerguide/rotate-keys.html

  - id: CR-AWS-GUARDDUTY-001
    version: 1.0.0
    provider: aws
    service: guardduty
    title: GuardDuty is enabled in the region
    description: Verifies at least one GuardDuty detector exists in the region.
    rationale: >
      GuardDuty provides managed threat detection over CloudTrail, DNS and VPC
      flow telemetry; regions without it have no native detection.
    severity: medium
    categories: [detection]
    source: { engine: prowler, id: guardduty_is_enabled, license: Apache-2.0 }
    collector: aws.guardduty.list_detectors
    resourceIdField: $scope
    passWhen: { op: lengthGt, path: DetectorIds, value: 0 }
    failMessage: GuardDuty is not enabled in this region.
    passMessage: GuardDuty is enabled in this region.
    remediation:
      summary: Enable GuardDuty (note - it is a paid service).
      steps:
        - Enable GuardDuty in each active region, ideally organisation-wide.
    compliance:
      - { framework: nist-csf, controls: [DE.CM] }
    references:
      - https://docs.aws.amazon.com/guardduty/latest/ug/what-is-guardduty.html

  - id: CR-AWS-CONFIG-001
    version: 1.0.0
    provider: aws
    service: config
    title: AWS Config recorder is enabled and recording
    description: Verifies the region has an AWS Config recorder that is actively recording.
    rationale: >
      AWS Config provides the configuration history needed for change
      forensics and drift detection.
    severity: medium
    categories: [logging, governance]
    source: { engine: prowler, id: config_recorder_all_regions_enabled, license: Apache-2.0 }
    collector: aws.config.describe_configuration_recorder_status
    resourceIdField: $scope
    passWhen:
      op: anyItem
      path: ConfigurationRecordersStatus
      condition: { op: equals, path: recording, value: true }
    failMessage: No active AWS Config recorder in this region.
    passMessage: AWS Config recorder is recording.
    remediation:
      summary: Enable an AWS Config recorder in each active region (paid service).
      steps:
        - Create a recorder and delivery channel, or use an organisation aggregator.
    compliance:
      - { framework: cis-aws-foundations, version: "3.0", controls: ["3.3"] }
    references:
      - https://docs.aws.amazon.com/config/latest/developerguide/stop-start-recorder.html
