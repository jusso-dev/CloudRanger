controls:
  - id: CR-AZURE-POSTGRESQL-100
    version: 1.0.0
    provider: azure
    service: postgresql
    title: PostgreSQL server enforces SSL connections
    description: Verifies each Azure Database for PostgreSQL Single Server has
      sslEnforcement set to Enabled.
    rationale: >
      With SSL enforcement disabled, clients can connect over plaintext,
      exposing credentials and query data to interception on the network path.
    severity: high
    categories:
      - database
      - encryption-in-transit
    source:
      engine: prowler
      id: postgresql_server_require_ssl_connection_enabled
      license: Apache-2.0
    collector: azure.postgresql.list
    resourcesPath: $
    resourceIdField: name
    resourceNameField: name
    passWhen:
      op: equals
      path: sslEnforcement
      value: Enabled
    failMessage: PostgreSQL server does not enforce SSL connections.
    passMessage: PostgreSQL server enforces SSL connections.
    remediation:
      summary: Enable SSL enforcement on the PostgreSQL server.
      steps:
        - Set the server's SSL enforcement to Enabled (operator action).
        - Ensure clients are configured to connect using TLS before enabling.
      verifyCommand: az postgres server list --output json
    compliance:
      - framework: cis-azure-foundations
        version: "2.1"
        controls:
          - 4.3.1
    references:
      - https://learn.microsoft.com/azure/postgresql/single-server/concepts-ssl-connection-security
  - id: CR-AZURE-POSTGRESQL-101
    version: 1.0.0
    provider: azure
    service: postgresql
    title: PostgreSQL server enforces TLS 1.2 or higher
    description: Verifies the minimalTlsVersion on each PostgreSQL Single Server is
      TLS1_2 or above.
    rationale: >
      Legacy TLS versions (1.0/1.1) are vulnerable to downgrade and known
      cryptographic attacks; enforcing TLS 1.2+ protects database sessions in
      transit.
    severity: medium
    categories:
      - database
      - encryption-in-transit
    source:
      engine: prowler
      id: postgresql_server_enforce_ssl_enabled
      license: Apache-2.0
    collector: azure.postgresql.list
    resourcesPath: $
    resourceIdField: name
    resourceNameField: name
    passWhen:
      op: in
      path: minimalTlsVersion
      values:
        - TLS1_2
        - TLS1_3
    failMessage: PostgreSQL server allows TLS below 1.2.
    passMessage: PostgreSQL server requires TLS 1.2 or higher.
    remediation:
      summary: Set the minimal TLS version to TLS1_2.
      steps:
        - Update the server's minimal TLS version to TLS1_2 (operator action).
        - Confirm clients support TLS 1.2 before applying to avoid outages.
      verifyCommand: az postgres server list --output json
    compliance:
      - framework: cis-azure-foundations
        version: "2.1"
        controls:
          - 4.3.1
    references:
      - https://learn.microsoft.com/azure/postgresql/single-server/concepts-ssl-connection-security
  - id: CR-AZURE-POSTGRESQL-102
    version: 1.0.0
    provider: azure
    service: postgresql
    title: PostgreSQL server public network access is disabled
    description: Verifies each PostgreSQL Single Server has publicNetworkAccess set
      to Disabled.
    rationale: >
      A publicly reachable PostgreSQL endpoint exposes the authentication
      surface to the entire internet; disabling public network access forces
      private connectivity and removes broad exposure to credential-stuffing and
      vulnerability scanning.
    severity: high
    categories:
      - database
      - public-exposure
      - network
    source:
      engine: prowler
      id: postgresql_server_public_network_access_disabled
      license: Apache-2.0
    collector: azure.postgresql.list
    resourcesPath: $
    resourceIdField: name
    resourceNameField: name
    passWhen:
      op: equals
      path: publicNetworkAccess
      value: Disabled
    failMessage: PostgreSQL server allows public network access.
    passMessage: PostgreSQL server public network access is disabled.
    remediation:
      summary: Disable public network access and use private endpoints.
      steps:
        - Create private endpoints for consuming applications.
        - Set the server's public network access to Disabled (operator action).
      verifyCommand: az postgres server list --output json
    compliance:
      - framework: cis-azure-foundations
        version: "2.1"
        controls:
          - 4.3.1
    references:
      - https://learn.microsoft.com/azure/postgresql/single-server/concepts-data-access-and-security-private-link
  - id: CR-AZURE-POSTGRESQL-103
    version: 1.0.0
    provider: azure
    service: postgresql
    title: PostgreSQL server has infrastructure double encryption enabled
    description: Verifies each PostgreSQL Single Server has infrastructureEncryption
      set to Enabled.
    rationale: >
      Infrastructure double encryption adds a second layer of encryption at rest
      beneath the service-managed layer, mitigating the risk of a single
      encryption algorithm or key being compromised for regulated data.
    severity: medium
    categories:
      - database
      - encryption
    source:
      engine: prowler
      id: postgresql_server_infrastructure_encryption_enabled
      license: Apache-2.0
    collector: azure.postgresql.list
    resourcesPath: $
    resourceIdField: name
    resourceNameField: name
    passWhen:
      op: equals
      path: infrastructureEncryption
      value: Enabled
    failMessage: PostgreSQL server does not have infrastructure double encryption enabled.
    passMessage: PostgreSQL server has infrastructure double encryption enabled.
    remediation:
      summary: Enable infrastructure double encryption at server creation.
      steps:
        - Infrastructure encryption must be enabled when the server is created;
          recreate the server with infrastructure encryption enabled and migrate
          data (operator action).
      verifyCommand: az postgres server list --output json
    compliance:
      - framework: cis-azure-foundations
        version: "2.1"
        controls:
          - 4.3.8
    references:
      - https://learn.microsoft.com/azure/postgresql/single-server/concepts-infrastructure-double-encryption
  - id: CR-AZURE-POSTGRESQL-150
    version: 1.0.0
    provider: azure
    service: postgresql
    title: PostgreSQL Flexible Server enforces SSL connections
    description: Verifies each PostgreSQL Flexible Server has the
      require_secure_transport server parameter set to ON.
    rationale: >
      With require_secure_transport off, clients may connect over plaintext,
      exposing credentials and query data to interception on the network path.
    severity: high
    categories:
      - database
      - encryption-in-transit
    source:
      engine: prowler
      id: postgresql_flexible_server_enforce_ssl_enabled
      license: Apache-2.0
    collector: azure.postgresql.flexible_parameter_list
    resourceIdField: $resourceKey
    passWhen:
      op: anyItem
      path: $
      condition:
        op: and
        exprs:
          - op: equals
            path: name
            value: require_secure_transport
          - op: equals
            path: value
            value: ON
    failMessage: PostgreSQL Flexible Server does not enforce SSL
      (require_secure_transport is not ON).
    passMessage: PostgreSQL Flexible Server enforces SSL connections.
    remediation:
      summary: Set require_secure_transport to ON.
      steps:
        - Ensure clients are configured to connect using TLS before enabling.
        - Set the server parameter require_secure_transport to ON (operator
          action).
      verifyCommand: az postgres flexible-server parameter list --ids <server-id>
        --output json
    compliance:
      - framework: cis-azure-foundations
        version: "2.1"
        controls:
          - 4.3.1
    references:
      - https://learn.microsoft.com/azure/postgresql/flexible-server/concepts-networking-ssl-tls
  - id: CR-AZURE-POSTGRESQL-151
    version: 1.0.0
    provider: azure
    service: postgresql
    title: PostgreSQL Flexible Server has connection throttling enabled
    description: Verifies each PostgreSQL Flexible Server has the
      connection_throttle.enable parameter set to ON.
    rationale: >
      Connection throttling temporarily blocks a host after repeated failed
      logins, blunting password brute-force and credential-stuffing attacks
      against the database endpoint.
    severity: medium
    categories:
      - database
      - identity
    source:
      engine: prowler
      id: postgresql_flexible_server_connection_throttling_on
      license: Apache-2.0
    collector: azure.postgresql.flexible_parameter_list
    resourceIdField: $resourceKey
    passWhen:
      op: anyItem
      path: $
      condition:
        op: and
        exprs:
          - op: equals
            path: name
            value: connection_throttle.enable
          - op: equals
            path: value
            value: ON
    failMessage: PostgreSQL Flexible Server does not have connection throttling enabled.
    passMessage: PostgreSQL Flexible Server has connection throttling enabled.
    remediation:
      summary: Set connection_throttle.enable to ON.
      steps:
        - Set the server parameter connection_throttle.enable to ON (operator
          action).
      verifyCommand: az postgres flexible-server parameter list --ids <server-id>
        --output json
    compliance:
      - framework: cis-azure-foundations
        version: "2.1"
        controls:
          - 4.3.6
    references:
      - https://learn.microsoft.com/azure/postgresql/flexible-server/concepts-server-parameters
  - id: CR-AZURE-POSTGRESQL-152
    version: 1.0.0
    provider: azure
    service: postgresql
    title: PostgreSQL Flexible Server logs checkpoints
    description: Verifies each PostgreSQL Flexible Server has the log_checkpoints
      parameter set to ON.
    rationale: >
      Logging checkpoints provides an audit trail of write-ahead log activity
      that supports forensic reconstruction and performance/incident analysis.
    severity: low
    categories:
      - database
      - logging
    source:
      engine: prowler
      id: postgresql_flexible_server_log_checkpoints_on
      license: Apache-2.0
    collector: azure.postgresql.flexible_parameter_list
    resourceIdField: $resourceKey
    passWhen:
      op: anyItem
      path: $
      condition:
        op: and
        exprs:
          - op: equals
            path: name
            value: log_checkpoints
          - op: equals
            path: value
            value: ON
    failMessage: PostgreSQL Flexible Server does not log checkpoints.
    passMessage: PostgreSQL Flexible Server logs checkpoints.
    remediation:
      summary: Set log_checkpoints to ON.
      steps:
        - Set the server parameter log_checkpoints to ON (operator action).
      verifyCommand: az postgres flexible-server parameter list --ids <server-id>
        --output json
    compliance:
      - framework: cis-azure-foundations
        version: "2.1"
        controls:
          - 4.3.2
    references:
      - https://learn.microsoft.com/azure/postgresql/flexible-server/concepts-server-parameters
  - id: CR-AZURE-POSTGRESQL-153
    version: 1.0.0
    provider: azure
    service: postgresql
    title: PostgreSQL Flexible Server logs connections
    description: Verifies each PostgreSQL Flexible Server has the log_connections
      parameter set to ON.
    rationale: >
      Logging successful and attempted connections records who accessed the
      database and from where, which is essential for detecting unauthorized
      access and for incident investigation.
    severity: low
    categories:
      - database
      - logging
    source:
      engine: prowler
      id: postgresql_flexible_server_log_connections_on
      license: Apache-2.0
    collector: azure.postgresql.flexible_parameter_list
    resourceIdField: $resourceKey
    passWhen:
      op: anyItem
      path: $
      condition:
        op: and
        exprs:
          - op: equals
            path: name
            value: log_connections
          - op: equals
            path: value
            value: ON
    failMessage: PostgreSQL Flexible Server does not log connections.
    passMessage: PostgreSQL Flexible Server logs connections.
    remediation:
      summary: Set log_connections to ON.
      steps:
        - Set the server parameter log_connections to ON (operator action).
      verifyCommand: az postgres flexible-server parameter list --ids <server-id>
        --output json
    compliance:
      - framework: cis-azure-foundations
        version: "2.1"
        controls:
          - 4.3.3
    references:
      - https://learn.microsoft.com/azure/postgresql/flexible-server/concepts-server-parameters
  - id: CR-AZURE-POSTGRESQL-154
    version: 1.0.0
    provider: azure
    service: postgresql
    title: PostgreSQL Flexible Server logs disconnections
    description: Verifies each PostgreSQL Flexible Server has the log_disconnections
      parameter set to ON.
    rationale: >
      Logging disconnections captures session end and duration, completing the
      connection audit trail and aiding detection of anomalous session patterns.
    severity: low
    categories:
      - database
      - logging
    source:
      engine: prowler
      id: postgresql_flexible_server_log_disconnections_on
      license: Apache-2.0
    collector: azure.postgresql.flexible_parameter_list
    resourceIdField: $resourceKey
    passWhen:
      op: anyItem
      path: $
      condition:
        op: and
        exprs:
          - op: equals
            path: name
            value: log_disconnections
          - op: equals
            path: value
            value: ON
    failMessage: PostgreSQL Flexible Server does not log disconnections.
    passMessage: PostgreSQL Flexible Server logs disconnections.
    remediation:
      summary: Set log_disconnections to ON.
      steps:
        - Set the server parameter log_disconnections to ON (operator action).
      verifyCommand: az postgres flexible-server parameter list --ids <server-id>
        --output json
    compliance:
      - framework: cis-azure-foundations
        version: "2.1"
        controls:
          - 4.3.4
    references:
      - https://learn.microsoft.com/azure/postgresql/flexible-server/concepts-server-parameters
  - id: CR-AZURE-POSTGRESQL-155
    version: 1.0.0
    provider: azure
    service: postgresql
    title: PostgreSQL Flexible Server log retention is at least 3 days
    description: Verifies each PostgreSQL Flexible Server has the log_retention_days
      parameter set to 3 or more days.
    rationale: >
      Retaining server logs for an adequate window ensures evidence remains
      available for investigation; too short a retention discards logs before an
      incident can be detected and analyzed.
    severity: low
    categories:
      - database
      - logging
    source:
      engine: prowler
      id: postgresql_flexible_server_log_retention_days_greater_3
      license: Apache-2.0
    collector: azure.postgresql.flexible_parameter_list
    resourceIdField: $resourceKey
    passWhen:
      op: anyItem
      path: $
      condition:
        op: and
        exprs:
          - op: equals
            path: name
            value: log_retention_days
          - op: gte
            path: value
            value: 3
    failMessage: PostgreSQL Flexible Server log_retention_days is below 3 days.
    passMessage: PostgreSQL Flexible Server retains logs for at least 3 days.
    remediation:
      summary: Set log_retention_days to 3 or higher.
      steps:
        - Set the server parameter log_retention_days to at least 3 (operator
          action).
      verifyCommand: az postgres flexible-server parameter list --ids <server-id>
        --output json
    compliance:
      - framework: cis-azure-foundations
        version: "2.1"
        controls:
          - 4.3.5
    references:
      - https://learn.microsoft.com/azure/postgresql/flexible-server/concepts-server-parameters
  - id: CR-AZURE-POSTGRESQL-156
    version: 1.0.0
    provider: azure
    service: postgresql
    title: PostgreSQL Flexible Server has geo-redundant backup enabled
    description: Verifies each PostgreSQL Flexible Server has
      backup.geoRedundantBackup set to Enabled.
    rationale: >
      Geo-redundant backups replicate backups to a paired region, allowing
      recovery of the database if the primary region suffers a prolonged outage
      or data loss.
    severity: medium
    categories:
      - database
      - resilience
    source:
      engine: prowler
      id: postgresql_flexible_server_geo_redundant_backup_enabled
      license: Apache-2.0
    collector: azure.postgresql.flexible_list
    resourcesPath: $
    resourceIdField: name
    resourceNameField: name
    passWhen:
      op: equals
      path: backup.geoRedundantBackup
      value: Enabled
    failMessage: PostgreSQL Flexible Server does not have geo-redundant backup enabled.
    passMessage: PostgreSQL Flexible Server has geo-redundant backup enabled.
    remediation:
      summary: Enable geo-redundant backup on the Flexible Server.
      steps:
        - Geo-redundant backup must be selected at server creation; recreate the
          server with geo-redundant backup enabled and migrate data (operator
          action).
      verifyCommand: az postgres flexible-server list --output json
    compliance: []
    references:
      - https://learn.microsoft.com/azure/postgresql/flexible-server/concepts-backup-restore
  - id: CR-AZURE-POSTGRESQL-157
    version: 1.0.0
    provider: azure
    service: postgresql
    title: PostgreSQL Flexible Server has high availability enabled
    description: Verifies each PostgreSQL Flexible Server has highAvailability.mode
      set to a value other than Disabled.
    rationale: >
      Without high availability there is no standby replica, so a zone or node
      failure causes an extended outage; zone-redundant or same-zone HA provides
      automatic failover for critical workloads.
    severity: medium
    categories:
      - database
      - resilience
    source:
      engine: prowler
      id: postgresql_flexible_server_high_availability_enabled
      license: Apache-2.0
    collector: azure.postgresql.flexible_list
    resourcesPath: $
    resourceIdField: name
    resourceNameField: name
    passWhen:
      op: and
      exprs:
        - op: exists
          path: highAvailability.mode
        - op: notEquals
          path: highAvailability.mode
          value: Disabled
    failMessage: PostgreSQL Flexible Server does not have high availability enabled.
    passMessage: PostgreSQL Flexible Server has high availability enabled.
    remediation:
      summary: Enable zone-redundant or same-zone high availability.
      steps:
        - Enable high availability (ZoneRedundant or SameZone) on the server
          (operator action).
      verifyCommand: az postgres flexible-server list --output json
    compliance: []
    references:
      - https://learn.microsoft.com/azure/postgresql/flexible-server/concepts-high-availability
  - id: CR-AZURE-POSTGRESQL-158
    version: 1.0.0
    provider: azure
    service: postgresql
    title: PostgreSQL Flexible Server does not allow access from all Azure services
    description: Verifies no firewall rule on the Flexible Server permits access
      from all Azure services (the 0.0.0.0 to 0.0.0.0 catch-all rule).
    rationale: >
      A firewall rule spanning 0.0.0.0 to 0.0.0.0 permits connections from any
      Azure resource in any tenant, dramatically widening the network attack
      surface beyond the account's own workloads.
    severity: high
    categories:
      - database
      - network
      - public-exposure
    source:
      engine: prowler
      id: postgresql_flexible_server_allow_access_services_disabled
      license: Apache-2.0
    collector: azure.postgresql.flexible_firewall_rule_list
    resourceIdField: $resourceKey
    passWhen:
      op: noneItem
      path: $
      condition:
        op: and
        exprs:
          - op: equals
            path: startIpAddress
            value: 0.0.0.0
          - op: equals
            path: endIpAddress
            value: 0.0.0.0
    failMessage: PostgreSQL Flexible Server allows access from all Azure services.
    passMessage: PostgreSQL Flexible Server does not allow access from all Azure services.
    remediation:
      summary: Remove the allow-all-Azure-services firewall rule.
      steps:
        - Delete the firewall rule with range 0.0.0.0 to 0.0.0.0 (operator
          action).
        - Replace it with specific client IP ranges or private access.
      verifyCommand: az postgres flexible-server firewall-rule list --ids <server-id>
        --output json
    compliance:
      - framework: cis-azure-foundations
        version: "2.1"
        controls:
          - 4.3.7
    references:
      - https://learn.microsoft.com/azure/postgresql/flexible-server/concepts-firewall-rules
