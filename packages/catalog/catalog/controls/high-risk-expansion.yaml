controls:
  - id: CR-AWS-EC2-150
    version: 1.0.0
    provider: aws
    service: ec2
    title: Do not expose PostgreSQL databases to the internet
    description: Security groups must not allow public IPv4 or IPv6 ingress to PostgreSQL TCP port 5432.
    rationale: Internet-exposed database ports are continuously scanned and can lead directly to data theft or administrative compromise.
    severity: critical
    categories: [network, public-exposure, database]
    source:
      {
        engine: prowler,
        id: ec2_securitygroup_allow_ingress_from_internet_to_tcp_port_postgres_5432,
        license: Apache-2.0,
      }
    collector: aws.ec2.describe_security_groups
    resourcesPath: SecurityGroups
    resourceIdField: GroupId
    resourceNameField: GroupName
    passWhen:
      op: noneItem
      path: IpPermissions
      condition:
        op: and
        exprs:
          - { op: portIncludes, fromPath: FromPort, toPath: ToPort, value: 5432 }
          - op: or
            exprs:
              - { op: anyItem, path: IpRanges, condition: { op: isPublicCidr, path: CidrIp } }
              - { op: anyItem, path: Ipv6Ranges, condition: { op: isPublicCidr, path: CidrIpv6 } }
    failMessage: Security group exposes PostgreSQL port 5432 to the internet.
    passMessage: PostgreSQL port 5432 is restricted to private or trusted sources.
    remediation:
      summary: Remove public PostgreSQL ingress and use private connectivity.
      steps:
        - Remove 0.0.0.0/0 and ::/0 ingress rules that include TCP port 5432.
        - Permit only application security groups or explicitly approved private CIDRs.
      verifyCommand: aws ec2 describe-security-groups --region <region> --output json
    compliance:
      - { framework: nist-csf, controls: [PR.AC] }
      - { framework: pci-dss, version: "4.0", controls: ["1.3.1"] }
      - { framework: iso-27001, version: "2022", controls: ["A.8.20"] }
    references:
      - https://docs.aws.amazon.com/vpc/latest/userguide/security-group-rules.html

  - id: CR-AZURE-APP-050
    version: 1.0.0
    provider: azure
    service: app
    title: Require HTTPS for Azure Function Apps
    description: Every Function App must redirect unencrypted HTTP requests to HTTPS.
    rationale: Plain HTTP can expose authentication tokens, request data, and administrative function keys in transit.
    severity: high
    categories: [serverless, encryption-in-transit]
    source:
      { engine: prowler, id: app_function_ensure_http_is_redirected_to_https, license: Apache-2.0 }
    collector: azure.app.functionapps_list
    resourcesPath: $
    resourceIdField: id
    resourceNameField: name
    passWhen: { op: equals, path: httpsOnly, value: true }
    failMessage: Function App accepts HTTP without enforcing HTTPS redirection.
    passMessage: Function App enforces HTTPS-only access.
    remediation:
      summary: Enable HTTPS Only for the Function App.
      steps:
        - In the Function App TLS settings, enable HTTPS Only.
        - Verify HTTP requests are redirected to HTTPS.
      verifyCommand: az functionapp list --subscription <subscription> --output json
    compliance:
      - { framework: nist-csf, controls: [PR.DS] }
      - { framework: pci-dss, version: "4.0", controls: ["4.2.1"] }
      - { framework: iso-27001, version: "2022", controls: ["A.8.24"] }
    references:
      - https://learn.microsoft.com/azure/azure-functions/security-concepts

  - id: CR-GCP-COMPUTE-150
    version: 1.0.0
    provider: gcp
    service: compute
    title: Keep virtual machines off the public internet
    description: Compute Engine instances must not have external IPv4 or IPv6 access configurations.
    rationale: Public IP addresses make workloads directly reachable and expand the attack surface for every listening service.
    severity: high
    categories: [compute, network, public-exposure]
    source: { engine: prowler, id: compute_instance_public_ip, license: Apache-2.0 }
    collector: gcp.compute.instances_list
    resourcesPath: $
    resourceIdField: name
    passWhen:
      op: noneItem
      path: networkInterfaces
      condition: { op: exists, path: accessConfigs }
    failMessage: VM has an external IP address and is directly exposed to the internet.
    passMessage: VM uses private addressing only.
    remediation:
      summary: Remove external access configurations from the VM.
      steps:
        - Remove external IPv4 and IPv6 access configurations from each network interface.
        - Use IAP or a controlled bastion for administration and Cloud NAT for outbound access.
      verifyCommand: gcloud compute instances list --project <project> --format json
    compliance:
      - { framework: nist-csf, controls: [PR.AC] }
      - { framework: pci-dss, version: "4.0", controls: ["1.4.1"] }
      - { framework: iso-27001, version: "2022", controls: ["A.8.20"] }
    references:
      - https://cloud.google.com/compute/docs/ip-addresses/reserve-static-external-ip-address
