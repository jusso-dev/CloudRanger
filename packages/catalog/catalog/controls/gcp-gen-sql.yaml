  - id: CR-GCP-SQL-150
    version: 1.0.0
    provider: gcp
    service: sql
    title: PostgreSQL Cloud SQL instance sets log_min_error_statement to error
    description: >
      For POSTGRES instances, verifies the log_min_error_statement database flag
      is set to error, so statements causing errors are logged.
    rationale: >
      If log_min_error_statement is set above error (e.g. panic/fatal), failing
      SQL statements are not recorded, removing the audit trail needed to detect
      injection attempts and misbehaving clients.
    severity: low
    categories:
      - database
      - logging
    source:
      engine: prowler
      id: cloudsql_instance_postgres_log_min_error_statement_flag
      license: Apache-2.0
    collector: gcp.sql.instances_list
    resourcesPath: $
    resourceIdField: name
    applicableWhen:
      op: startsWith
      path: databaseVersion
      value: POSTGRES
    passWhen:
      op: anyItem
      path: settings.databaseFlags
      condition:
        op: and
        exprs:
          - op: equals
            path: name
            value: log_min_error_statement
          - op: equals
            path: value
            value: error
    failMessage: PostgreSQL instance does not set log_min_error_statement to error.
    passMessage: PostgreSQL instance sets log_min_error_statement to error.
    remediation:
      summary: Set the log_min_error_statement flag to error.
      steps:
        - Add the database flag log_min_error_statement=error to the instance.
      verifyCommand: gcloud sql instances list --project <project> --format json
    compliance:
      - framework: cis-gcp-foundation
        version: "3.0"
        controls:
          - 6.2.7
    references:
      - https://cloud.google.com/sql/docs/postgres/flags
  - id: CR-GCP-SQL-151
    version: 1.0.0
    provider: gcp
    service: sql
    title: PostgreSQL Cloud SQL instance disables log_min_duration_statement
    description: >
      For POSTGRES instances, verifies the log_min_duration_statement database
      flag is set to -1, which disables logging full statement text by duration.
    rationale: >
      A non-negative log_min_duration_statement causes full SQL statement text
      (potentially containing sensitive parameter values) to be written to logs,
      creating a data-exposure risk; CIS recommends -1 to disable it.
    severity: low
    categories:
      - database
      - logging
    source:
      engine: prowler
      id: cloudsql_instance_postgres_log_min_duration_statement_flag
      license: Apache-2.0
    collector: gcp.sql.instances_list
    resourcesPath: $
    resourceIdField: name
    applicableWhen:
      op: startsWith
      path: databaseVersion
      value: POSTGRES
    passWhen:
      op: anyItem
      path: settings.databaseFlags
      condition:
        op: and
        exprs:
          - op: equals
            path: name
            value: log_min_duration_statement
          - op: equals
            path: value
            value: "-1"
    failMessage: PostgreSQL instance does not set log_min_duration_statement to -1.
    passMessage: PostgreSQL instance disables log_min_duration_statement (-1).
    remediation:
      summary: Set the log_min_duration_statement flag to -1.
      steps:
        - Add the database flag log_min_duration_statement=-1 to the instance.
      verifyCommand: gcloud sql instances list --project <project> --format json
    compliance:
      - framework: cis-gcp-foundation
        version: "3.0"
        controls:
          - 6.2.6
    references:
      - https://cloud.google.com/sql/docs/postgres/flags
