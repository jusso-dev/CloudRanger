    provider: gcp
    service: sql
    title: SQL Server Cloud SQL instance disables external scripts enabled
    description: >
      For SQLSERVER instances, verifies the "external scripts enabled" database
      flag is set to off, preventing execution of external R/Python scripts.
    rationale: >
      Enabling external scripts lets the database run arbitrary R/Python code on
      the server, which is a code-execution and lateral-movement risk if an
      account is compromised.
    severity: high
    categories:
      - database
      - identity
    source:
      engine: prowler
      id: cloudsql_instance_sqlserver_external_scripts_enabled_flag
      license: Apache-2.0
    collector: gcp.sql.instances_list
    resourcesPath: $
    resourceIdField: name
    applicableWhen:
      op: startsWith
      path: databaseVersion
      value: SQLSERVER
    passWhen:
      op: anyItem
      path: settings.databaseFlags
      condition:
        op: and
        exprs:
          - op: equals
            path: name
            value: external scripts enabled
          - op: equals
            path: value
            value: off
    failMessage: SQL Server instance does not set "external scripts enabled" to off.
    passMessage: SQL Server instance has "external scripts enabled" set to off.
    remediation:
      summary: Set the "external scripts enabled" flag to off.
      steps:
        - Set the database flag "external scripts enabled"=off on the instance.
      verifyCommand: gcloud sql instances list --project <project> --format json
    compliance:
      - framework: cis-gcp-foundation
        version: "3.0"
        controls:
          - 6.3.4
    references:
      - https://cloud.google.com/sql/docs/sqlserver/flags
  - id: CR-GCP-SQL-156
    version: 1.0.0
    provider: gcp
    service: sql
    title: SQL Server Cloud SQL instance disables remote access
    description: >
      For SQLSERVER instances, verifies the "remote access" database flag is set
      to off, blocking the running of local stored procedures from remote
      servers.
    rationale: >
      With remote access enabled, remote servers can run local stored procedures
      on the instance, widening the attack surface for privilege escalation and
      denial-of-service against the database engine.
    severity: medium
    categories:
      - database
      - network
    source:
      engine: prowler
      id: cloudsql_instance_sqlserver_remote_access_flag
      license: Apache-2.0
    collector: gcp.sql.instances_list
    resourcesPath: $
    resourceIdField: name
    applicableWhen:
      op: startsWith
      path: databaseVersion
      value: SQLSERVER
    passWhen:
      op: anyItem
      path: settings.databaseFlags
      condition:
        op: and
        exprs:
          - op: equals
            path: name
            value: remote access
          - op: equals
            path: value
            value: off
    failMessage: SQL Server instance does not set "remote access" to off.
    passMessage: SQL Server instance has "remote access" set to off.
    remediation:
      summary: Set the "remote access" flag to off.
      steps:
        - Set the database flag "remote access"=off on the instance.
      verifyCommand: gcloud sql instances list --project <project> --format json
    compliance:
      - framework: cis-gcp-foundation
        version: "3.0"
        controls:
          - 6.3.6
    references:
      - https://cloud.google.com/sql/docs/sqlserver/flags
  - id: CR-GCP-SQL-157
    version: 1.0.0
    provider: gcp
    service: sql
    title: Cloud SQL instance is encrypted with a customer-managed key (CMEK)
    description: >
      Verifies diskEncryptionConfiguration.kmsKeyName is present, so the
      instance's data at rest is encrypted with a customer-managed Cloud KMS key
      rather than the default Google-managed key.
    rationale: >
      Without CMEK, the organization cannot independently control key rotation,
      access, or revocation for the database's at-rest encryption, weakening
      cryptographic control over sensitive data.
    severity: medium
    categories:
      - database
      - encryption
    source:
      engine: prowler
      id: cloudsql_instance_cmek_encryption_enabled_enabled
      license: Apache-2.0
    collector: gcp.sql.instances_list
    resourcesPath: $
    resourceIdField: name
    passWhen:
      op: exists
      path: diskEncryptionConfiguration.kmsKeyName
    failMessage: Cloud SQL instance uses Google-managed encryption; no CMEK configured.
    passMessage: Cloud SQL instance is encrypted with a customer-managed key.
    remediation:
      summary: Create the instance with a customer-managed Cloud KMS key.
      steps:
        - Provision the instance with a CMEK (disk-encryption-key) from Cloud
          KMS.
        - CMEK cannot be added to an existing instance; recreate it with the key.
      verifyCommand: gcloud sql instances list --project <project> --format json
    compliance:
      - framework: cis-gcp-foundation
        version: "3.0"
        controls:
          - "6.4"
    references:
      - https://cloud.google.com/sql/docs/mysql/cmek
  - id: CR-GCP-SQL-158
    version: 1.0.0
    provider: gcp
    service: sql
    title: Cloud SQL instance does not have a public IPv4 address
    description: >
      Verifies settings.ipConfiguration.ipv4Enabled is false so the instance is
      not assigned a public IP and is reachable only via private IP or the Auth
      Proxy.
    rationale: >
      A public IPv4 address exposes the database endpoint to the internet, where
      it is subject to credential stuffing and exploitation of the database
      engine; private IP keeps traffic on the VPC.
    severity: high
    categories:
      - database
      - network
      - public-exposure
    source:
      engine: prowler
      id: cloudsql_instance_private_ip_assignment
      license: Apache-2.0
    collector: gcp.sql.instances_list
    resourcesPath: $
    resourceIdField: name
    passWhen:
      op: notEquals
      path: settings.ipConfiguration.ipv4Enabled
      value: true
    failMessage: Cloud SQL instance has a public IPv4 address (ipv4Enabled true).
    passMessage: Cloud SQL instance has no public IPv4 address.
    remediation:
      summary: Disable public IP and use private IP.
      steps:
        - Disable the public IPv4 address on the instance.
        - Configure a private IP on the instance's VPC and connect via the Auth
          Proxy or private networking.
      verifyCommand: gcloud sql instances list --project <project> --format json
    compliance:
      - framework: cis-gcp-foundation
        version: "3.0"
        controls:
          - "6.6"
    references:
      - https://cloud.google.com/sql/docs/mysql/configure-private-ip
