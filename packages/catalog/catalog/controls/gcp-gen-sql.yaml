    references:
      - https://cloud.google.com/sql/docs/postgres/flags
  - id: CR-GCP-SQL-153
    version: 1.0.0
    provider: gcp
    service: sql
    title: PostgreSQL Cloud SQL instance sets log_error_verbosity to default
    description: >
      For POSTGRES instances, verifies the log_error_verbosity database flag is
      set to default (rather than terse), so error logs retain useful detail.
    rationale: >
      A terse log_error_verbosity strips detail and context lines from error
      messages, reducing the diagnostic value of logs during security
      investigations and troubleshooting.
    severity: low
    categories:
      - database
      - logging
    source:
      engine: prowler
      id: cloudsql_instance_postgres_log_error_verbosity_flag
      license: Apache-2.0
    collector: gcp.sql.instances_list
    resourcesPath: $
    resourceIdField: name
    applicableWhen:
      op: startsWith
      path: databaseVersion
      value: POSTGRES
    passWhen:
      op: anyItem
      path: settings.databaseFlags
      condition:
        op: and
        exprs:
          - op: equals
            path: name
            value: log_error_verbosity
          - op: in
            path: value
            values:
              - default
              - verbose
    failMessage: PostgreSQL instance sets log_error_verbosity to terse (not default).
    passMessage: PostgreSQL instance sets log_error_verbosity to default or verbose.
    remediation:
      summary: Set the log_error_verbosity flag to default.
      steps:
        - Add the database flag log_error_verbosity=default to the instance.
      verifyCommand: gcloud sql instances list --project <project> --format json
    compliance:
      - framework: cis-gcp-foundation
        version: "3.0"
        controls:
          - 6.2.5
    references:
      - https://cloud.google.com/sql/docs/postgres/flags
  - id: CR-GCP-SQL-154
    version: 1.0.0
    provider: gcp
    service: sql
    title: MySQL Cloud SQL instance has skip_show_database enabled
    description: >
      For MYSQL instances, verifies the skip_show_database database flag is set
      to on, preventing users without the SHOW DATABASES privilege from
      enumerating databases.
    rationale: >
      With skip_show_database off, any authenticated user can list every
      database on the server via SHOW DATABASES, aiding reconnaissance and
      lateral movement toward sensitive schemas.
    severity: low
    categories:
      - database
      - identity
    source:
      engine: prowler
      id: cloudsql_instance_mysql_skip_show_database_flag
      license: Apache-2.0
    collector: gcp.sql.instances_list
    resourcesPath: $
    resourceIdField: name
    applicableWhen:
      op: startsWith
      path: databaseVersion
      value: MYSQL
    passWhen:
      op: anyItem
      path: settings.databaseFlags
      condition:
        op: and
        exprs:
          - op: equals
            path: name
            value: skip_show_database
          - op: equals
            path: value
            value: on
    failMessage: MySQL instance does not have skip_show_database set to on.
    passMessage: MySQL instance has skip_show_database enabled.
    remediation:
      summary: Set the skip_show_database flag to on.
      steps:
        - Add the database flag skip_show_database=on to the instance.
      verifyCommand: gcloud sql instances list --project <project> --format json
    compliance:
      - framework: cis-gcp-foundation
        version: "3.0"
        controls:
          - 6.1.2
    references:
      - https://cloud.google.com/sql/docs/mysql/flags
  - id: CR-GCP-SQL-155
