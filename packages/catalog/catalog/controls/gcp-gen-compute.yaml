controls:
  - id: CR-GCP-COMPUTE-100
    version: 1.0.0
    provider: gcp
    service: compute
    title: Instance has no public IP address
    description: >
      Verifies that no network interface on the instance has an external access
      config (which assigns a public/ephemeral or static external IP).
    rationale: >
      A public IP makes the instance directly reachable and scannable from the
      internet, expanding the attack surface for any exposed service.
    severity: high
    categories:
      - compute
      - network
      - public-exposure
    source:
      engine: prowler
      id: compute_public_ip_shodan
      license: Apache-2.0
    collector: gcp.compute.instances_list
    resourcesPath: $
    resourceIdField: name
    applicableWhen:
      op: not
      expr:
        op: startsWith
        path: name
        value: gke-
    passWhen:
      op: noneItem
      path: networkInterfaces
      condition:
        op: exists
        path: accessConfigs
    failMessage: Instance has a network interface with an external IP.
    passMessage: Instance has no external IP (private only).
    remediation:
      summary: Remove external access configs and use Cloud NAT / IAP for egress and
        access.
      steps:
        - Delete the external accessConfig from each network interface (operator
          action).
        - Use Identity-Aware Proxy or a bastion for administrative access.
        - Use Cloud NAT for outbound internet if required.
      verifyCommand: gcloud compute instances list --project <project> --format json
    compliance: []
    references:
      - https://cloud.google.com/compute/docs/ip-addresses/reserve-static-external-ip-address
  - id: CR-GCP-COMPUTE-101
    version: 1.0.0
    provider: gcp
    service: compute
    title: Instance enforces OS Login via metadata
    description: >
      Verifies enable-oslogin is set true in the instance's own metadata so SSH
      access is bound to IAM identities.
    rationale: >
      OS Login centralises SSH access control and audit under IAM; without it,
      access relies on scattered SSH keys with no central lifecycle.
    severity: medium
    categories:
      - compute
      - identity
    source:
      engine: prowler
      id: compute_instance_oslogin_enabled
      license: Apache-2.0
    collector: gcp.compute.instances_list
    resourcesPath: $
    resourceIdField: name
    applicableWhen:
      op: not
      expr:
        op: startsWith
        path: name
        value: gke-
    passWhen:
      op: anyItem
      path: metadata.items
      condition:
        op: and
        exprs:
          - op: equals
            path: key
            value: enable-oslogin
          - op: in
            path: value
            values:
              - "TRUE"
              - "true"
              - "True"
              - "1"
              - true
    failMessage: Instance does not enable OS Login in its metadata.
    passMessage: Instance enforces OS Login.
    remediation:
      summary: Set enable-oslogin=TRUE in instance metadata (or enforce project-wide).
      steps:
        - Add enable-oslogin TRUE to the instance metadata (operator action).
        - Prefer enforcing OS Login at the project level for consistency.
      verifyCommand: gcloud compute instances list --project <project> --format json
    compliance:
      - framework: cis-gcp-foundation
        version: "3.0"
        controls:
          - "4.4"
    references:
      - https://cloud.google.com/compute/docs/oslogin
  - id: CR-GCP-COMPUTE-102
    version: 1.0.0
    provider: gcp
    service: compute
    title: Instance has Shielded VM Secure Boot enabled
    description: Verifies shieldedInstanceConfig.enableSecureBoot is true on the instance.
    rationale: >
      Secure Boot ensures only signed, trusted boot components load, blocking
      boot-level malware and unsigned kernel drivers.
    severity: medium
    categories:
      - compute
      - integrity
    source:
      engine: prowler
      id: compute_instance_shielded_vm_enabled
      license: Apache-2.0
    collector: gcp.compute.instances_list
    resourcesPath: $
    resourceIdField: name
    applicableWhen:
      op: not
      expr:
        op: startsWith
        path: name
        value: gke-
    passWhen:
      op: equals
      path: shieldedInstanceConfig.enableSecureBoot
      value: true
    failMessage: Instance does not have Shielded VM Secure Boot enabled.
    passMessage: Shielded VM Secure Boot is enabled.
    remediation:
      summary: Enable Secure Boot (requires instance stop; image must support it).
      steps:
        - Stop the instance and enable Secure Boot in Shielded VM options
          (operator action).
        - Ensure the boot image supports Secure Boot (UEFI-compatible).
      verifyCommand: gcloud compute instances list --project <project> --format json
    compliance:
      - framework: cis-gcp-foundation
        version: "3.0"
        controls:
          - "4.8"
    references:
      - https://cloud.google.com/security/shielded-cloud/shielded-vm
  - id: CR-GCP-COMPUTE-103
    version: 1.0.0
    provider: gcp
    service: compute
    title: Instance service account is not granted full cloud-platform scope
    description: >
      Verifies no attached service account is granted the broad
      https://www.googleapis.com/auth/cloud-platform access scope.
    rationale: >
      The cloud-platform scope permits the instance to call every Google Cloud
      API the service account is authorised for, so a compromise inherits the
      full IAM surface rather than a scoped set of APIs.
    severity: high
    categories:
      - compute
      - identity
    source:
      engine: prowler
      id: compute_instance_default_service_account_in_use
      license: Apache-2.0
    collector: gcp.compute.instances_list
    resourcesPath: $
    resourceIdField: name
    applicableWhen:
      op: not
      expr:
        op: startsWith
        path: name
        value: gke-
    passWhen:
      op: noneItem
      path: serviceAccounts
      condition:
        op: contains
        path: scopes
        value: https://www.googleapis.com/auth/cloud-platform
    failMessage: Instance service account has full cloud-platform API scope.
    passMessage: Instance uses restricted service account scopes.
    remediation:
      summary: Replace cloud-platform with narrow scopes matched to the workload.
      steps:
        - Determine the minimum API scopes the workload needs.
        - Stop the instance and set specific scopes instead of cloud-platform
          (operator action).
        - Prefer IAM roles on a dedicated service account over broad scopes.
      verifyCommand: gcloud compute instances list --project <project> --format json
    compliance:
      - framework: cis-gcp-foundation
        version: "3.0"
        controls:
          - "4.2"
    references:
      - https://cloud.google.com/compute/docs/access/service-accounts#scopes_best_practice
  - id: CR-GCP-COMPUTE-104
    version: 1.0.0
    provider: gcp
    service: compute
    title: Confidential Computing is enabled on the instance
    description: >
      Verifies confidentialInstanceConfig.enableConfidentialCompute is true so
      memory is encrypted in use.
    rationale: >
      Confidential VMs encrypt data in use, protecting sensitive workloads from
      inspection by the hypervisor or a compromised host.
    severity: low
    categories:
      - compute
      - encryption
    source:
      engine: prowler
      id: compute_instance_confidential_computing_enabled
      license: Apache-2.0
    collector: gcp.compute.instances_list
    resourcesPath: $
    resourceIdField: name
    applicableWhen:
      op: not
      expr:
        op: startsWith
        path: name
        value: gke-
    passWhen:
      op: equals
      path: confidentialInstanceConfig.enableConfidentialCompute
      value: true
    failMessage: Instance does not have Confidential Computing enabled.
    passMessage: Confidential Computing is enabled.
    remediation:
      summary: Recreate the instance as a Confidential VM on a supported machine type.
      steps:
        - Choose a Confidential Computing supported machine type (e.g. N2D/C2D).
        - Recreate the instance with Confidential Computing enabled (operator
          action).
      verifyCommand: gcloud compute instances list --project <project> --format json
    compliance: []
    references:
      - https://cloud.google.com/confidential-computing/confidential-vm/docs/confidential-vm-overview
  - id: CR-GCP-COMPUTE-105
    version: 1.0.0
    provider: gcp
    service: compute
    title: Instance metadata does not contain plaintext SSH keys
    description: >
      Verifies the instance metadata has no ssh-keys (or legacy sshKeys) entry,
      which would define per-instance keys outside OS Login.
    rationale: >
      Instance-level SSH keys in metadata bypass IAM-based OS Login and are hard
      to rotate or audit, becoming stale standing credentials.
    severity: medium
    categories:
      - compute
      - identity
    source:
      engine: prowler
      id: compute_instance_oslogin_enabled
      license: Apache-2.0
    collector: gcp.compute.instances_list
    resourcesPath: $
    resourceIdField: name
    applicableWhen:
      op: not
      expr:
        op: startsWith
        path: name
        value: gke-
    passWhen:
      op: noneItem
      path: metadata.items
      condition:
        op: in
        path: key
        values:
          - ssh-keys
          - sshKeys
    failMessage: Instance metadata defines plaintext SSH keys.
    passMessage: Instance metadata has no plaintext SSH keys.
    remediation:
      summary: Remove ssh-keys/sshKeys metadata and use OS Login instead.
      steps:
        - Delete the ssh-keys and sshKeys metadata entries (operator action).
        - Enable OS Login to manage SSH access via IAM.
      verifyCommand: gcloud compute instances list --project <project> --format json
    compliance:
      - framework: cis-gcp-foundation
        version: "3.0"
        controls:
          - "4.3"
    references:
      - https://cloud.google.com/compute/docs/connect/add-ssh-keys
  - id: CR-GCP-COMPUTE-106
    version: 1.0.0
    provider: gcp
    service: compute
    title: Project blocks serial port access by default
    description: >
      Verifies serial-port-enable is not set true in project-wide compute
      metadata.
    rationale: >
      Enabling serial port access at the project level exposes interactive
      console access on every instance, bypassing network-based controls.
    severity: medium
    categories:
      - compute
      - network
    source:
      engine: prowler
      id: compute_project_serial_ports_disabled
      license: Apache-2.0
    collector: gcp.compute.project_info
    resourceIdField: $scope
    passWhen:
      op: noneItem
      path: commonInstanceMetadata.items
      condition:
        op: and
        exprs:
          - op: equals
            path: key
            value: serial-port-enable
          - op: in
            path: value
            values:
              - "true"
              - "TRUE"
              - "True"
              - "1"
              - true
    failMessage: Project enables interactive serial port access by default.
    passMessage: Project does not enable serial port access by default.
    remediation:
      summary: Remove or set serial-port-enable=false in project metadata.
      steps:
        - Update project-wide metadata to disable serial port access (operator
          action).
      verifyCommand: gcloud compute project-info describe --project <project> --format json
    compliance:
      - framework: cis-gcp-foundation
        version: "3.0"
        controls:
          - "4.5"
    references:
      - https://cloud.google.com/compute/docs/instances/interacting-with-serial-console
  - id: CR-GCP-COMPUTE-107
    version: 1.0.0
    provider: gcp
    service: compute
    title: Instance disks use customer-managed encryption keys
    description: >
      Verifies every attached disk declares a diskEncryptionKey (CSEK or CMEK
      via Cloud KMS) rather than only Google-managed default encryption.
    rationale: >
      Customer-managed keys give control over key rotation and revocation, so
      access to disk data can be centrally cut off during an incident.
    severity: low
    categories:
      - compute
      - encryption
    source:
      engine: prowler
      id: compute_instance_encryption_with_csek_disabled
      license: Apache-2.0
    collector: gcp.compute.instances_list
    resourcesPath: $
    resourceIdField: name
    applicableWhen:
      op: not
      expr:
        op: startsWith
        path: name
        value: gke-
    passWhen:
      op: allItems
      path: disks
      condition:
        op: exists
        path: diskEncryptionKey
    failMessage: One or more disks rely on default Google-managed encryption only.
    passMessage: All disks use customer-managed encryption keys.
    remediation:
      summary: Recreate disks with a Cloud KMS (CMEK) or customer-supplied (CSEK) key.
      steps:
        - Create disks encrypted with a KMS key or customer-supplied key
          (operator action).
        - Migrate data from default-encrypted disks and detach them.
      verifyCommand: gcloud compute instances list --project <project> --format json
    compliance:
      - framework: cis-gcp-foundation
        version: "3.0"
        controls:
          - "4.7"
    references:
      - https://cloud.google.com/compute/docs/disks/customer-managed-encryption
  - id: CR-GCP-COMPUTE-108
    version: 1.0.0
    provider: gcp
    service: compute
    title: Instance does not enable serial port access
    description: >
      Verifies serial-port-enable is not true in the instance's own metadata,
      complementing the project-level default check.
    rationale: >
      An instance can re-enable serial console access even when the project
      default disables it, restoring an out-of-band access path.
    severity: medium
    categories:
      - compute
      - network
    source:
      engine: prowler
      id: compute_instance_serial_ports_in_use
      license: Apache-2.0
    collector: gcp.compute.instances_list
    resourcesPath: $
    resourceIdField: name
    applicableWhen:
      op: not
      expr:
        op: startsWith
        path: name
        value: gke-
    passWhen:
      op: noneItem
      path: metadata.items
      condition:
        op: and
        exprs:
          - op: equals
            path: key
            value: serial-port-enable
          - op: in
            path: value
            values:
              - "true"
              - "TRUE"
              - "True"
              - "1"
              - true
    failMessage: Instance re-enables interactive serial port access.
    passMessage: Instance does not enable serial port access.
    remediation:
      summary: Remove or set serial-port-enable=false in instance metadata.
      steps:
        - Update the instance metadata to disable serial port access (operator
          action).
      verifyCommand: gcloud compute instances list --project <project> --format json
    compliance:
      - framework: cis-gcp-foundation
        version: "3.0"
        controls:
          - "4.5"
    references:
      - https://cloud.google.com/compute/docs/instances/interacting-with-serial-console
  - id: CR-GCP-COMPUTE-109
    version: 1.0.0
    provider: gcp
    service: compute
    title: Instance has all Shielded VM protections enabled
    description: >
      Verifies Secure Boot, vTPM, and integrity monitoring are all enabled,
      giving the full Shielded VM protection set.
    rationale: >
      Only the complete Shielded VM set (Secure Boot + vTPM + integrity
      monitoring) provides measured, verified boot with tamper detection.
    severity: medium
    categories:
      - compute
      - integrity
    source:
      engine: prowler
      id: compute_instance_shielded_vm_enabled
      license: Apache-2.0
    collector: gcp.compute.instances_list
    resourcesPath: $
    resourceIdField: name
    applicableWhen:
      op: not
      expr:
        op: startsWith
        path: name
        value: gke-
    passWhen:
      op: and
      exprs:
        - op: equals
          path: shieldedInstanceConfig.enableSecureBoot
          value: true
        - op: equals
          path: shieldedInstanceConfig.enableVtpm
          value: true
        - op: equals
          path: shieldedInstanceConfig.enableIntegrityMonitoring
          value: true
    failMessage: Instance is missing one or more Shielded VM protections.
    passMessage: All Shielded VM protections are enabled.
    remediation:
      summary: Enable Secure Boot, vTPM and integrity monitoring (requires instance
        stop).
      steps:
        - Stop the instance and enable all three Shielded VM options (operator
          action).
        - Ensure the boot image supports Secure Boot.
      verifyCommand: gcloud compute instances list --project <project> --format json
    compliance:
      - framework: cis-gcp-foundation
        version: "3.0"
        controls:
          - "4.8"
    references:
      - https://cloud.google.com/security/shielded-cloud/shielded-vm
  - id: CR-GCP-COMPUTE-110
    version: 1.0.0
    provider: gcp
    service: compute
    title: Instance service account does not use deprecated broad scopes
    description: >
      Verifies no attached service account is granted legacy broad scopes such
      as the read/write compute or full storage scopes.
    rationale: >
      Legacy aliases like compute-rw and full storage scopes grant far more API
      access than most workloads need, widening blast radius on compromise.
    severity: medium
    categories:
      - compute
      - identity
    source:
      engine: prowler
      id: compute_instance_default_service_account_in_use
      license: Apache-2.0
    collector: gcp.compute.instances_list
    resourcesPath: $
    resourceIdField: name
    applicableWhen:
      op: not
      expr:
        op: startsWith
        path: name
        value: gke-
    passWhen:
      op: noneItem
      path: serviceAccounts
      condition:
        op: or
        exprs:
          - op: contains
            path: scopes
            value: https://www.googleapis.com/auth/compute
          - op: contains
            path: scopes
            value: https://www.googleapis.com/auth/devstorage.full_control
    failMessage: Instance service account uses overly broad legacy scopes.
    passMessage: Instance service account avoids broad legacy scopes.
    remediation:
      summary: Replace broad scopes with narrow read-only or task-specific scopes.
      steps:
        - Identify the minimum scopes the workload needs.
        - Stop the instance and set narrow scopes (operator action).
      verifyCommand: gcloud compute instances list --project <project> --format json
    compliance:
      - framework: cis-gcp-foundation
        version: "3.0"
        controls:
          - "4.2"
    references:
      - https://cloud.google.com/compute/docs/access/service-accounts#scopes_best_practice
  - id: CR-GCP-COMPUTE-111
    version: 1.0.0
    provider: gcp
    service: compute
    title: Running instance has deletion protection enabled
    description: >
      Verifies deletionProtection is true on running instances to guard against
      accidental or malicious termination.
    rationale: >
      Without deletion protection a single API call can destroy a production
      instance, causing outage and potential data loss.
    severity: low
    categories:
      - compute
      - resilience
    source:
      engine: prowler
      id: compute_instance_default_service_account_in_use
      license: Apache-2.0
    collector: gcp.compute.instances_list
    resourcesPath: $
    resourceIdField: name
    applicableWhen:
      op: and
      exprs:
        - op: not
          expr:
            op: startsWith
            path: name
            value: gke-
        - op: equals
          path: status
          value: RUNNING
    passWhen:
      op: equals
      path: deletionProtection
      value: true
    failMessage: Running instance does not have deletion protection enabled.
    passMessage: Instance has deletion protection enabled.
    remediation:
      summary: Enable deletion protection on the instance.
      steps:
        - Set deletion protection on the instance (operator action).
      verifyCommand: gcloud compute instances list --project <project> --format json
    compliance: []
    references:
      - https://cloud.google.com/compute/docs/instances/preventing-accidental-vm-deletion
  - id: CR-GCP-COMPUTE-151
    version: 1.0.0
    provider: gcp
    service: compute
    title: Instance has automatic restart enabled
    description: >
      Verifies scheduling.automaticRestart is true so the instance is
      automatically recreated after a maintenance event or host failure.
    rationale: >
      Without automatic restart, a host maintenance event or crash leaves the
      workload down until an operator intervenes, harming availability of
      standard (non-preemptible) services.
    severity: low
    categories:
      - compute
      - resilience
    source:
      engine: prowler
      id: compute_instance_automatic_restart_enabled
      license: Apache-2.0
    collector: gcp.compute.instances_list
    resourcesPath: $
    resourceIdField: name
    applicableWhen:
      op: not
      expr:
        op: startsWith
        path: name
        value: gke-
    passWhen:
      op: equals
      path: scheduling.automaticRestart
      value: true
    failMessage: Instance does not have automatic restart enabled.
    passMessage: Instance has automatic restart enabled.
    remediation:
      summary: Enable automatic restart in the instance scheduling options.
      steps:
        - Set the instance scheduling automatic-restart option to on (operator
          action).
        - Note that preemptible/Spot VMs cannot use automatic restart by design.
      verifyCommand: gcloud compute instances list --project <project> --format json
    compliance: []
    references:
      - https://cloud.google.com/compute/docs/instances/setting-instance-scheduling-options
  - id: CR-GCP-COMPUTE-152
    version: 1.0.0
    provider: gcp
    service: compute
    title: Instance has a single network interface
    description: >
      Verifies the instance has exactly one network interface, avoiding
      multi-NIC configurations that can bridge otherwise isolated networks.
    rationale: >
      A multi-NIC instance attached to several VPCs can act as an unmanaged
      bridge between trust zones, defeating network segmentation and enabling
      lateral movement.
    severity: medium
    categories:
      - compute
      - network
    source:
      engine: prowler
      id: compute_instance_single_network_interface
      license: Apache-2.0
    collector: gcp.compute.instances_list
    resourcesPath: $
    resourceIdField: name
    applicableWhen:
      op: not
      expr:
        op: startsWith
        path: name
        value: gke-
    passWhen:
      op: lengthEquals
      path: networkInterfaces
      value: 1
    failMessage: Instance has multiple network interfaces (bridges VPCs).
    passMessage: Instance has a single network interface.
    remediation:
      summary: Reduce the instance to a single network interface.
      steps:
        - Review why multiple NICs are attached; consolidate onto one VPC where
          possible (operator action).
        - Use dedicated appliances or peering rather than multi-NIC bridging.
      verifyCommand: gcloud compute instances list --project <project> --format json
    compliance: []
    references:
      - https://cloud.google.com/vpc/docs/create-use-multiple-interfaces
  - id: CR-GCP-COMPUTE-153
    version: 1.0.0
    provider: gcp
    service: compute
    title: Instance does not use the default Compute Engine service account
    description: >
      Verifies no attached service account is the project default Compute Engine
      identity (ending -compute@developer.gserviceaccount.com).
    rationale: >
      The default Compute Engine service account is broadly privileged and
      shared across the project, so a compromised VM using it inherits wide
      access; a dedicated least-privilege service account limits blast radius.
    severity: high
    categories:
      - compute
      - identity
    source:
      engine: prowler
      id: compute_instance_default_service_account_in_use
      license: Apache-2.0
    collector: gcp.compute.instances_list
    resourcesPath: $
    resourceIdField: name
    applicableWhen:
      op: not
      expr:
        op: startsWith
        path: name
        value: gke-
    passWhen:
      op: noneItem
      path: serviceAccounts
      condition:
        op: endsWith
        path: email
        value: -compute@developer.gserviceaccount.com
    failMessage: Instance uses the default Compute Engine service account.
    passMessage: Instance uses a dedicated (non-default) service account.
    remediation:
      summary: Attach a dedicated least-privilege service account instead of the
        default.
      steps:
        - Create a dedicated service account scoped to the workload's needs.
        - Stop the instance and set it to use that service account (operator
          action).
      verifyCommand: gcloud compute instances list --project <project> --format json
    compliance:
      - framework: cis-gcp-foundation
        version: "3.0"
        controls:
          - "4.1"
    references:
      - https://cloud.google.com/compute/docs/access/service-accounts#default_service_account
  - id: CR-GCP-COMPUTE-154
    version: 1.0.0
    provider: gcp
    service: compute
    title: Project enforces OS Login two-factor authentication
    description: >
      Verifies enable-oslogin-2fa is set true in project-wide compute metadata
      so SSH via OS Login requires a second factor.
    rationale: >
      OS Login 2FA blocks SSH access with a stolen key or password alone,
      materially raising the bar for account takeover of Linux instances.
    severity: medium
    categories:
      - compute
      - identity
    source:
      engine: prowler
      id: compute_project_os_login_2fa_enabled
      license: Apache-2.0
    collector: gcp.compute.project_info
    resourcesPath: $
    resourceIdField: $scope
    passWhen:
      op: anyItem
      path: commonInstanceMetadata.items
      condition:
        op: and
        exprs:
          - op: equals
            path: key
            value: enable-oslogin-2fa
          - op: in
            path: value
            values:
              - "TRUE"
              - "true"
              - "True"
              - "1"
              - true
    failMessage: Project does not enforce OS Login two-factor authentication.
    passMessage: Project enforces OS Login two-factor authentication.
    remediation:
      summary: Set enable-oslogin-2fa=TRUE in project-wide compute metadata.
      steps:
        - Ensure OS Login itself is enabled (enable-oslogin=TRUE).
        - Add enable-oslogin-2fa TRUE to project-wide metadata (operator action).
      verifyCommand: gcloud compute project-info describe --project <project> --format json
    compliance:
      - framework: cis-gcp-foundation
        version: "3.0"
        controls:
          - "4.4"
    references:
      - https://cloud.google.com/compute/docs/oslogin/set-up-oslogin#enable_two_factor_authentication
  - id: CR-GCP-COMPUTE-155
    version: 1.0.0
    provider: gcp
    service: compute
    title: Instance has Shielded VM vTPM enabled
    description: >
      Verifies shieldedInstanceConfig.enableVtpm is true so the instance has a
      virtual Trusted Platform Module for measured boot and key protection.
    rationale: >
      The vTPM underpins measured boot and integrity monitoring; without it the
      instance cannot attest its boot state or protect keys from a compromised
      guest.
    severity: medium
    categories:
      - compute
      - integrity
    source:
      engine: prowler
      id: compute_instance_shielded_vm_enabled
      license: Apache-2.0
    collector: gcp.compute.instances_list
    resourcesPath: $
    resourceIdField: name
    applicableWhen:
      op: not
      expr:
        op: startsWith
        path: name
        value: gke-
    passWhen:
      op: equals
      path: shieldedInstanceConfig.enableVtpm
      value: true
    failMessage: Instance does not have Shielded VM vTPM enabled.
    passMessage: Shielded VM vTPM is enabled.
    remediation:
      summary: Enable vTPM in the instance Shielded VM options.
      steps:
        - Stop the instance and enable vTPM in Shielded VM options (operator
          action).
        - Ensure the boot image is UEFI-compatible.
      verifyCommand: gcloud compute instances list --project <project> --format json
    compliance:
      - framework: cis-gcp-foundation
        version: "3.0"
        controls:
          - "4.8"
    references:
      - https://cloud.google.com/security/shielded-cloud/shielded-vm
  - id: CR-GCP-COMPUTE-156
    version: 1.0.0
    provider: gcp
    service: compute
    title: Instance has Shielded VM integrity monitoring enabled
    description: >
      Verifies shieldedInstanceConfig.enableIntegrityMonitoring is true so boot
      integrity is measured and compared against a trusted baseline.
    rationale: >
      Integrity monitoring detects boot-level tampering (rootkits, bootkits) by
      comparing measurements to a known-good baseline; without it such
      compromises go unnoticed.
    severity: medium
    categories:
      - compute
      - integrity
    source:
      engine: prowler
      id: compute_instance_shielded_vm_enabled
      license: Apache-2.0
    collector: gcp.compute.instances_list
    resourcesPath: $
    resourceIdField: name
    applicableWhen:
      op: not
      expr:
        op: startsWith
        path: name
        value: gke-
    passWhen:
      op: equals
      path: shieldedInstanceConfig.enableIntegrityMonitoring
      value: true
    failMessage: Instance does not have Shielded VM integrity monitoring enabled.
    passMessage: Shielded VM integrity monitoring is enabled.
    remediation:
      summary: Enable integrity monitoring in the instance Shielded VM options.
      steps:
        - Stop the instance and enable integrity monitoring in Shielded VM
          options (operator action).
        - Requires vTPM to be enabled.
      verifyCommand: gcloud compute instances list --project <project> --format json
    compliance:
      - framework: cis-gcp-foundation
        version: "3.0"
        controls:
          - "4.8"
    references:
      - https://cloud.google.com/security/shielded-cloud/shielded-vm#integrity-monitoring
  - id: CR-GCP-COMPUTE-157
    version: 1.0.0
    provider: gcp
    service: compute
    title: Custom image is not publicly shared
    description: >
      Verifies no IAM binding on the custom image grants access to allUsers or
      allAuthenticatedUsers.
    rationale: >
      A publicly shared image can be read and instantiated by anyone, exposing
      any embedded configuration, credentials or proprietary software baked into
      the image.
    severity: high
    categories:
      - compute
      - public-exposure
    source:
      engine: prowler
      id: compute_image_not_publicly_shared
      license: Apache-2.0
    collector: gcp.compute.image_iam_policy
    resourceIdField: $resourceKey
    passWhen:
      op: noneItem
      path: bindings
      condition:
        op: or
        exprs:
          - op: contains
            path: members
            value: allUsers
          - op: contains
            path: members
            value: allAuthenticatedUsers
    onError:
      - contains: PERMISSION_DENIED
        status: error
      - contains: was not found
        status: not_applicable
        message: Image no longer exists.
    failMessage: Custom image is shared publicly (allUsers/allAuthenticatedUsers).
    passMessage: Custom image is not publicly shared.
    remediation:
      summary: Remove allUsers and allAuthenticatedUsers from the image IAM policy.
      steps:
        - Remove any binding granting allUsers or allAuthenticatedUsers on the
          image (operator action).
        - Share the image only with specific principals or projects.
      verifyCommand: gcloud compute images get-iam-policy <image> --project <project>
        --format json
    compliance: []
    references:
      - https://cloud.google.com/compute/docs/images/sharing-images-across-projects
  - id: CR-GCP-COMPUTE-158
    version: 1.0.0
    provider: gcp
    service: compute
    title: Disk snapshots are not older than 90 days
    description: >
      Verifies each snapshot was created within the last 90 days so backups
      reflect a recent recovery point.
    rationale: >
      Stale snapshots give a false sense of backup coverage; recovering from a
      months-old snapshot means large data loss and drift from current
      configuration.
    severity: low
    categories:
      - compute
      - resilience
    source:
      engine: prowler
      id: compute_snapshot_not_outdated
      license: Apache-2.0
    collector: gcp.compute.snapshots_list
    resourcesPath: $
    resourceIdField: name
    passWhen:
      op: daysSinceLt
      path: creationTimestamp
      value: 90
    failMessage: Snapshot is older than 90 days.
    passMessage: Snapshot was created within the last 90 days.
    remediation:
      summary: Refresh backups and prune stale snapshots on a schedule.
      steps:
        - Create current snapshots or a snapshot schedule for the source disks.
        - Delete snapshots that are no longer a valid recovery point (operator
          action).
      verifyCommand: gcloud compute snapshots list --project <project> --format json
    compliance: []
    references:
      - https://cloud.google.com/compute/docs/disks/scheduled-snapshots
