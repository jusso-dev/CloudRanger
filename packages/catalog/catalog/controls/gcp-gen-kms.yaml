controls:
  - id: CR-GCP-KMS-120
    version: 1.0.0
    provider: gcp
    service: kms
    title: No Cloud KMS role is granted to anonymous or all-authenticated principals
      at the project level
    description: >
      Verifies the project IAM policy grants no Cloud KMS role
      (roles/cloudkms.*) to the special members allUsers or
      allAuthenticatedUsers.
    rationale: >
      A KMS role granted to allUsers or allAuthenticatedUsers makes key
      operations (and in some roles the key material lifecycle) reachable by
      anonymous or any-Google-account identities, undermining the entire
      cryptographic boundary the keys are meant to enforce.
    severity: critical
    categories:
      - encryption
      - identity
      - public-exposure
    source:
      engine: prowler
      id: kms_key_not_publicly_accessible
      license: Apache-2.0
    collector: gcp.project.iam_policy
    resourceIdField: $scope
    passWhen:
      op: noneItem
      path: bindings
      condition:
        op: and
        exprs:
          - op: startsWith
            path: role
            value: roles/cloudkms
          - op: anyItem
            path: members
            condition:
              op: in
              path: $
              values:
                - allUsers
                - allAuthenticatedUsers
    failMessage: A Cloud KMS role is granted to allUsers or allAuthenticatedUsers at
      the project level.
    passMessage: No Cloud KMS role is publicly accessible at the project level.
    remediation:
      summary: Remove allUsers/allAuthenticatedUsers from every Cloud KMS role binding.
      steps:
        - Identify project IAM bindings whose role starts with roles/cloudkms.
        - Remove the allUsers and allAuthenticatedUsers members from those
          bindings and re-grant to specific principals (operator action).
      verifyCommand: gcloud projects get-iam-policy <project> --format json
    compliance:
      - framework: cis-gcp-foundation
        version: "3.0"
        controls:
          - "1.9"
    references:
      - https://cloud.google.com/kms/docs/reference/permissions-and-roles
      - https://cloud.google.com/iam/docs/overview#allusers
  - id: CR-GCP-KMS-121
    version: 1.0.0
    provider: gcp
    service: kms
    title: The Cloud KMS Admin role is not granted to a user or group at the project
      level
    description: >
      Verifies the project IAM policy grants roles/cloudkms.admin to no user: or
      group: principal, preserving separation of duties between key management
      and key usage.
    rationale: >
      roles/cloudkms.admin allows creating, destroying, and re-granting access
      to every key in the project; granting it broadly to users or groups breaks
      separation of duties and lets a single compromised identity control or
      destroy all cryptographic keys.
    severity: high
    categories:
      - encryption
      - identity
      - least-privilege
    source:
      engine: prowler
      id: kms_key_not_publicly_accessible
      license: Apache-2.0
    collector: gcp.project.iam_policy
    resourceIdField: $scope
    passWhen:
      op: noneItem
      path: bindings
      condition:
        op: and
        exprs:
          - op: equals
            path: role
            value: roles/cloudkms.admin
          - op: anyItem
            path: members
            condition:
              op: or
              exprs:
                - op: startsWith
                  path: $
                  value: "user:"
                - op: startsWith
                  path: $
                  value: "group:"
    failMessage: The Cloud KMS Admin role is granted to a user or group at the
      project level.
    passMessage: No user or group holds the Cloud KMS Admin role at the project level.
    remediation:
      summary: Restrict roles/cloudkms.admin to dedicated key-management service
        accounts.
      steps:
        - Remove roles/cloudkms.admin from user and group principals in the
          project IAM policy.
        - Grant key administration to a dedicated, tightly controlled service
          account, and scope it to specific keyrings where possible (operator
          action).
      verifyCommand: gcloud projects get-iam-policy <project> --format json
    compliance:
      - framework: cis-gcp-foundation
        version: "3.0"
        controls:
          - "1.9"
    references:
      - https://cloud.google.com/kms/docs/reference/permissions-and-roles
      - https://cloud.google.com/kms/docs/separation-of-duties
  - id: CR-GCP-KMS-122
    version: 1.0.0
    provider: gcp
    service: kms
    title: CryptoKey encrypt/decrypt roles are not granted publicly at the project
      level
    description: >
      Verifies the project IAM policy grants no CryptoKey usage role
      (roles/cloudkms.cryptoKeyEncrypterDecrypter, cryptoKeyEncrypter,
      cryptoKeyDecrypter, or signerVerifier) to allUsers or
      allAuthenticatedUsers.
    rationale: >
      Public grants of encrypt/decrypt/sign roles let anonymous or
      any-authenticated identities use the project's keys to decrypt protected
      data or forge signatures, defeating the confidentiality and integrity the
      keys provide even though the key material itself is never exposed.
    severity: critical
    categories:
      - encryption
      - public-exposure
    source:
      engine: prowler
      id: kms_key_not_publicly_accessible
      license: Apache-2.0
    collector: gcp.project.iam_policy
    resourceIdField: $scope
    passWhen:
      op: noneItem
      path: bindings
      condition:
        op: and
        exprs:
          - op: in
            path: role
            values:
              - roles/cloudkms.cryptoKeyEncrypterDecrypter
              - roles/cloudkms.cryptoKeyEncrypter
              - roles/cloudkms.cryptoKeyDecrypter
              - roles/cloudkms.signerVerifier
          - op: anyItem
            path: members
            condition:
              op: in
              path: $
              values:
                - allUsers
                - allAuthenticatedUsers
    failMessage: A CryptoKey usage role is granted to allUsers or
      allAuthenticatedUsers at the project level.
    passMessage: No CryptoKey usage role is publicly accessible at the project level.
    remediation:
      summary: Remove public members from CryptoKey encrypt/decrypt/sign role bindings.
      steps:
        - Find project IAM bindings for
          roles/cloudkms.cryptoKeyEncrypterDecrypter and related usage roles.
        - Remove allUsers and allAuthenticatedUsers and re-grant only to the
          specific service accounts that must use the keys (operator action).
      verifyCommand: gcloud projects get-iam-policy <project> --format json
    compliance:
      - framework: cis-gcp-foundation
        version: "3.0"
        controls:
          - "1.9"
    references:
      - https://cloud.google.com/kms/docs/reference/permissions-and-roles
      - https://cloud.google.com/kms/docs/iam
  - id: CR-GCP-KMS-150
    version: 1.0.0
    provider: gcp
    service: kms
    title: Cloud KMS symmetric encryption keys have automatic rotation enabled
    description: >
      Every CryptoKey whose purpose is ENCRYPT_DECRYPT defines an automatic
      rotation schedule, i.e. both rotationPeriod and nextRotationTime are set.
    rationale: >
      Without automatic rotation a symmetric key encrypts an ever-growing volume
      of data under a single key version; a compromise of that version exposes
      all data ever protected by the key, and long-lived keys widen the window
      for cryptanalysis and key leakage.
    severity: medium
    categories:
      - encryption
      - resilience
    source:
      engine: prowler
      id: kms_key_rotation_enabled
      license: Apache-2.0
    collector: gcp.kms.inventory_keys_list
    resourcesPath: $
    resourceIdField: name
    resourceNameField: name
    applicableWhen:
      op: equals
      path: purpose
      value: ENCRYPT_DECRYPT
    passWhen:
      op: and
      exprs:
        - op: exists
          path: rotationPeriod
        - op: exists
          path: nextRotationTime
    failMessage: Symmetric CryptoKey does not have automatic rotation configured.
    passMessage: Symmetric CryptoKey has automatic rotation enabled.
    remediation:
      summary: Set a rotation schedule on the key.
      steps:
        - Identify ENCRYPT_DECRYPT keys with no rotationPeriod/nextRotationTime.
        - Configure automatic rotation, e.g. gcloud kms keys
          set-rotation-schedule KEY --keyring RING --location LOC
          --rotation-period 7776000s --next-rotation-time <ISO time> (operator
          action).
      verifyCommand: gcloud kms inventory list-keys --project <project> --format json
    compliance:
      - framework: cis-gcp-foundation
        version: "3.0"
        controls:
          - "1.10"
    references:
      - https://cloud.google.com/kms/docs/rotate-key
      - https://cloud.google.com/kms/docs/reference/rest/v1/projects.locations.keyRings.cryptoKeys
  - id: CR-GCP-KMS-151
    version: 1.0.0
    provider: gcp
    service: kms
    title: Cloud KMS key rotation period is 90 days or less
    description: >
      For every CryptoKey that has an automatic rotation schedule, the
      rotationPeriod is at most 90 days (7,776,000 seconds).
    rationale: >
      A rotation period longer than 90 days leaves each key version protecting
      data for an extended time, increasing the blast radius of a key-version
      compromise and diverging from the CIS baseline of rotating encryption keys
      at least every 90 days.
    severity: medium
    categories:
      - encryption
      - resilience
    source:
      engine: prowler
      id: kms_key_rotation_enabled
      license: Apache-2.0
    collector: gcp.kms.inventory_keys_list
    resourcesPath: $
    resourceIdField: name
    resourceNameField: name
    applicableWhen:
      op: exists
      path: rotationPeriod
    passWhen:
      op: matches
      path: rotationPeriod
      pattern: ^([1-9][0-9]{0,5}|[1-6][0-9]{6}|7[0-6][0-9]{5}|77[0-6][0-9]{4}|777[0-5][0-9]{3}|7776000)s$
    failMessage: CryptoKey rotation period exceeds 90 days.
    passMessage: CryptoKey rotation period is 90 days or less.
    remediation:
      summary: Lower the rotation period to 90 days or less.
      steps:
        - Identify keys whose rotationPeriod exceeds 7776000s (90 days).
        - Shorten it, e.g. gcloud kms keys set-rotation-schedule KEY --keyring
          RING --location LOC --rotation-period 7776000s (operator action).
      verifyCommand: gcloud kms inventory list-keys --project <project> --format json
    compliance:
      - framework: cis-gcp-foundation
        version: "3.0"
        controls:
          - "1.10"
    references:
      - https://cloud.google.com/kms/docs/rotate-key
      - https://cloud.google.com/kms/docs/reference/rest/v1/projects.locations.keyRings.cryptoKeys
