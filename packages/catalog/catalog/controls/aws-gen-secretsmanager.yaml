controls:
  - id: CR-AWS-SECRETS-100
    version: 1.0.0
    provider: aws
    service: secretsmanager
    title: Secrets Manager secret has been rotated within 90 days
    description: Verifies every secret has a LastRotatedDate within the last 90 days.
    rationale: A secret that is never rotated or remains unchanged for long periods has
      an unbounded exposure window if it is copied, logged, or otherwise compromised.
    severity: medium
    categories: [secrets, credentials]
    source: { engine: prowler, id: secretsmanager_secret_rotated_periodically, license: Apache-2.0 }
    collector: aws.secretsmanager.list_secrets
    resourcesPath: SecretList
    resourceIdField: ARN
    resourceNameField: Name
    passWhen:
      op: and
      exprs:
        - { op: exists, path: LastRotatedDate }
        - { op: daysSinceLt, path: LastRotatedDate, value: 90 }
    failMessage: Secret has never been rotated or was last rotated more than 90 days ago.
    passMessage: Secret was rotated within the last 90 days.
    remediation:
      summary: Configure and verify a rotation schedule appropriate to the secret type.
      steps:
        - Attach a tested rotation Lambda or managed rotation schedule to the secret.
        - Rotate the current value and verify all consumers use the updated credential.
      verifyCommand: aws secretsmanager list-secrets --region <region> --output json
    compliance: []
    references:
      - https://docs.aws.amazon.com/secretsmanager/latest/userguide/rotating-secrets.html

  - id: CR-AWS-SECRETS-101
    version: 1.0.0
    provider: aws
    service: secretsmanager
    title: Secrets Manager secret has been accessed within 90 days
    description: Verifies every secret records a LastAccessedDate within the last 90 days.
    rationale: Unused secrets create unnecessary attack surface and often indicate
      abandoned workloads or credentials that should be retired.
    severity: medium
    categories: [secrets, governance]
    source: { engine: prowler, id: secretsmanager_secret_unused, license: Apache-2.0 }
    collector: aws.secretsmanager.list_secrets
    resourcesPath: SecretList
    resourceIdField: ARN
    resourceNameField: Name
    passWhen:
      op: and
      exprs:
        - { op: exists, path: LastAccessedDate }
        - { op: daysSinceLt, path: LastAccessedDate, value: 90 }
    failMessage: Secret has never been accessed or has not been accessed within 90 days.
    passMessage: Secret has been accessed within the last 90 days.
    remediation:
      summary: Confirm the secret is still required, then retire it or restore a valid consumer.
      steps:
        - Identify the workload and owner expected to use the secret.
        - Delete unused secrets after a documented recovery period, or investigate a broken consumer.
      verifyCommand: aws secretsmanager list-secrets --region <region> --output json
    compliance: []
    references:
      - https://docs.aws.amazon.com/secretsmanager/latest/userguide/manage_delete-secret.html
