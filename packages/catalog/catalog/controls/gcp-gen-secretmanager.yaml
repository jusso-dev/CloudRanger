controls:
  - id: CR-GCP-SECRETMANAGER-100
    version: 1.0.0
    provider: gcp
    service: secretmanager
    title: Secret is encrypted with a customer-managed key (CMEK)
    description: >
      Verifies the secret's replication policy specifies customer-managed
      encryption (CMEK) rather than relying solely on Google-managed keys, for
      either automatic or user-managed replication.
    rationale: >
      Google-managed default encryption gives you no control over key lifecycle,
      rotation, or revocation; CMEK lets you revoke access to secret material by
      disabling the key, a critical control for sensitive credentials.
    severity: medium
    categories:
      - encryption
      - identity
    source:
      engine: prowler
      id: secretsmanager_secret_encrypted_with_cmk
      license: Apache-2.0
    collector: gcp.secretmanager.secrets_list
    resourcesPath: $
    resourceIdField: name
    resourceNameField: name
    passWhen:
      op: or
      exprs:
        - op: exists
          path: replication.automatic.customerManagedEncryption.kmsKeyName
        - op: and
          exprs:
            - op: exists
              path: replication.userManaged.replicas
            - op: not
              expr:
                op: anyItem
                path: replication.userManaged.replicas
                condition:
                  op: notExists
                  path: customerManagedEncryption.kmsKeyName
    failMessage: Secret uses Google-managed encryption; no CMEK configured.
    passMessage: Secret is encrypted with a customer-managed key.
    remediation:
      summary: Recreate the secret with a customer-managed KMS key.
      steps:
        - Create a Cloud KMS key and grant the Secret Manager service agent the
          CryptoKey Encrypter/Decrypter role.
        - Recreate the secret specifying the KMS key for each replica (CMEK
          cannot be added to an existing secret in place).
      verifyCommand: gcloud secrets list --project <project> --format json
    compliance: []
    references:
      - https://cloud.google.com/secret-manager/docs/cmek
  - id: CR-GCP-SECRETMANAGER-101
    version: 1.0.0
    provider: gcp
    service: secretmanager
    title: Secret has automatic rotation configured
    description: >
      Verifies the secret defines a rotation policy (rotationPeriod and a
      scheduled nextRotationTime) so its material is refreshed periodically.
    rationale: >
      Long-lived secrets that are never rotated widen the window for a leaked
      credential to be abused; a rotation schedule bounds that exposure.
    severity: medium
    categories:
      - identity
      - resilience
    source:
      engine: prowler
      id: secretmanager_secret_rotation_enabled
      license: Apache-2.0
    collector: gcp.secretmanager.secrets_list
    resourcesPath: $
    resourceIdField: name
    resourceNameField: name
    passWhen:
      op: and
      exprs:
        - op: exists
          path: rotation.nextRotationTime
        - op: exists
          path: rotation.rotationPeriod
    failMessage: Secret has no rotation policy configured.
    passMessage: Secret has an automatic rotation schedule.
    remediation:
      summary: Configure a rotation period and next rotation time on the secret.
      steps:
        - Add a Pub/Sub topic and rotation policy to the secret.
        - Set --rotation-period and --next-rotation-time so Secret Manager
          publishes rotation notifications.
      verifyCommand: gcloud secrets list --project <project> --format json
    compliance: []
    references:
      - https://cloud.google.com/secret-manager/docs/rotation-recommendations
  - id: CR-GCP-SECRETMANAGER-102
    version: 1.0.0
    provider: gcp
    service: secretmanager
    title: Secret has labels for ownership and governance
    description: >
      Verifies the secret carries at least one label so it can be attributed to
      an owner, environment, or cost center.
    rationale: >
      Unlabeled secrets are hard to inventory, attribute, and govern; missing
      ownership metadata slows incident response and lifecycle cleanup of
      orphaned credentials.
    severity: low
    categories:
      - governance
      - identity
    source:
      engine: prowler
      id: secretsmanager_secret_has_labels
      license: Apache-2.0
    collector: gcp.secretmanager.secrets_list
    resourcesPath: $
    resourceIdField: name
    resourceNameField: name
    passWhen:
      op: not
      expr:
        op: isEmpty
        path: labels
    failMessage: Secret has no labels.
    passMessage: Secret has at least one label.
    remediation:
      summary: Add governance labels to the secret.
      steps:
        - Define a labeling standard (owner, environment, data-classification).
        - Apply labels to the secret via update.
      verifyCommand: gcloud secrets list --project <project> --format json
    compliance: []
    references:
      - https://cloud.google.com/secret-manager/docs/creating-and-accessing-secrets
  - id: CR-GCP-SECRETMANAGER-150
    version: 1.0.0
    provider: gcp
    service: secretmanager
    title: Secret is not publicly accessible via its IAM policy
    description: >
      Verifies no binding in the secret's IAM policy grants access to allUsers
      or allAuthenticatedUsers, which would let anyone (or any authenticated
      Google identity) read or manage the secret.
    rationale: >
      Secret Manager stores credentials, API keys, and tokens; a public IAM
      binding on a secret exposes that material to the internet or to every
      Google account, a direct path to credential theft and lateral movement.
    severity: critical
    categories:
      - identity
      - public-exposure
    source:
      engine: prowler
      id: secretmanager_secret_not_publicly_accessible
      license: Apache-2.0
    collector: gcp.secretmanager.secret_iam_policy
    resourceIdField: $resourceKey
    passWhen:
      op: not
      expr:
        op: anyItem
        path: bindings
        condition:
          op: anyItem
          path: members
          condition:
            op: in
            path: $
            values:
              - allUsers
              - allAuthenticatedUsers
    onError:
      - contains: PERMISSION_DENIED
        status: error
      - contains: NOT_FOUND
        status: not_applicable
        message: Secret no longer exists.
    failMessage: Secret IAM policy grants access to allUsers or allAuthenticatedUsers.
    passMessage: Secret IAM policy has no public (allUsers/allAuthenticatedUsers) members.
    remediation:
      summary: Remove public members from the secret's IAM policy.
      steps:
        - Identify bindings whose members include allUsers or
          allAuthenticatedUsers.
        - Remove those members with gcloud secrets remove-iam-policy-binding,
          granting access only to specific principals or groups.
      verifyCommand: gcloud secrets get-iam-policy <secret> --project <project> --format json
    compliance: []
    references:
      - https://cloud.google.com/secret-manager/docs/access-control
      - https://cloud.google.com/secret-manager/docs/manage-access-to-secrets
  - id: CR-GCP-SECRETMANAGER-151
    version: 1.0.0
    provider: gcp
    service: secretmanager
    title: Secret with a rotation schedule has a notification topic configured
    description: >
      Verifies that a secret which defines a rotation schedule also attaches at
      least one Pub/Sub notification topic, so rotation and expiry events are
      actually delivered to an automation consumer.
    rationale: >
      A rotation period with no topic means Secret Manager has nothing to notify
      when rotation is due; the secret's material silently ages past its
      intended lifetime, defeating the purpose of the rotation policy.
    severity: medium
    categories:
      - identity
      - resilience
    source:
      engine: prowler
      id: secretmanager_secret_rotation_enabled
      license: Apache-2.0
    collector: gcp.secretmanager.secrets_list
    resourcesPath: $
    resourceIdField: name
    resourceNameField: name
    applicableWhen:
      op: exists
      path: rotation.rotationPeriod
    passWhen:
      op: and
      exprs:
        - op: exists
          path: topics
        - op: not
          expr:
            op: isEmpty
            path: topics
        - op: anyItem
          path: topics
          condition:
            op: exists
            path: name
    failMessage: Secret has a rotation schedule but no Pub/Sub notification topic.
    passMessage: Secret has a rotation schedule and at least one notification topic.
    remediation:
      summary: Attach a Pub/Sub topic to the rotating secret.
      steps:
        - Create or choose a Pub/Sub topic and grant the Secret Manager service
          agent the pubsub.publisher role on it.
        - Update the secret to add the topic so rotation/expiry events are
          published.
      verifyCommand: gcloud secrets list --project <project> --format json
    compliance: []
    references:
      - https://cloud.google.com/secret-manager/docs/event-notifications
      - https://cloud.google.com/secret-manager/docs/rotation-recommendations
