controls:
  - id: CR-GCP-SECRETMANAGER-100
    version: 1.0.0
    provider: gcp
    service: secretmanager
    title: Secret is encrypted with a customer-managed key (CMEK)
    description: >
      Verifies the secret's replication policy specifies customer-managed
      encryption (CMEK) rather than relying solely on Google-managed keys, for
      either automatic or user-managed replication.
    rationale: >
      Google-managed default encryption gives you no control over key lifecycle,
      rotation, or revocation; CMEK lets you revoke access to secret material by
      disabling the key, a critical control for sensitive credentials.
    severity: medium
    categories:
      - encryption
      - identity
    source:
      engine: prowler
      id: secretsmanager_secret_encrypted_with_cmk
      license: Apache-2.0
    collector: gcp.secretmanager.secrets_list
    resourcesPath: $
    resourceIdField: name
    resourceNameField: name
    passWhen:
      op: or
      exprs:
        - op: exists
          path: replication.automatic.customerManagedEncryption.kmsKeyName
        - op: and
          exprs:
            - op: exists
              path: replication.userManaged.replicas
            - op: not
              expr:
                op: anyItem
                path: replication.userManaged.replicas
                condition:
                  op: notExists
                  path: customerManagedEncryption.kmsKeyName
    failMessage: Secret uses Google-managed encryption; no CMEK configured.
    passMessage: Secret is encrypted with a customer-managed key.
    remediation:
      summary: Recreate the secret with a customer-managed KMS key.
      steps:
        - Create a Cloud KMS key and grant the Secret Manager service agent the
          CryptoKey Encrypter/Decrypter role.
        - Recreate the secret specifying the KMS key for each replica (CMEK
          cannot be added to an existing secret in place).
      verifyCommand: gcloud secrets list --project <project> --format json
    compliance: []
    references:
      - https://cloud.google.com/secret-manager/docs/cmek
  - id: CR-GCP-SECRETMANAGER-101
    version: 1.0.0
    provider: gcp
    service: secretmanager
    title: Secret has automatic rotation configured
    description: >
      Verifies the secret defines a rotation policy (rotationPeriod and a
      scheduled nextRotationTime) so its material is refreshed periodically.
    rationale: >
      Long-lived secrets that are never rotated widen the window for a leaked
      credential to be abused; a rotation schedule bounds that exposure.
    severity: medium
    categories:
      - identity
      - resilience
    source:
      engine: prowler
      id: secretsmanager_automatic_rotation_enabled
      license: Apache-2.0
    collector: gcp.secretmanager.secrets_list
    resourcesPath: $
    resourceIdField: name
    resourceNameField: name
    passWhen:
      op: and
      exprs:
        - op: exists
          path: rotation.nextRotationTime
        - op: exists
          path: rotation.rotationPeriod
    failMessage: Secret has no rotation policy configured.
    passMessage: Secret has an automatic rotation schedule.
    remediation:
      summary: Configure a rotation period and next rotation time on the secret.
      steps:
        - Add a Pub/Sub topic and rotation policy to the secret.
        - Set --rotation-period and --next-rotation-time so Secret Manager
          publishes rotation notifications.
      verifyCommand: gcloud secrets list --project <project> --format json
    compliance: []
    references:
      - https://cloud.google.com/secret-manager/docs/rotation-recommendations
  - id: CR-GCP-SECRETMANAGER-102
    version: 1.0.0
    provider: gcp
    service: secretmanager
    title: Secret has labels for ownership and governance
    description: >
      Verifies the secret carries at least one label so it can be attributed to
      an owner, environment, or cost center.
    rationale: >
      Unlabeled secrets are hard to inventory, attribute, and govern; missing
      ownership metadata slows incident response and lifecycle cleanup of
      orphaned credentials.
    severity: low
    categories:
      - governance
      - identity
    source:
      engine: prowler
      id: secretsmanager_secret_has_labels
      license: Apache-2.0
    collector: gcp.secretmanager.secrets_list
    resourcesPath: $
    resourceIdField: name
    resourceNameField: name
    passWhen:
      op: not
      expr:
        op: isEmpty
        path: labels
    failMessage: Secret has no labels.
    passMessage: Secret has at least one label.
    remediation:
      summary: Add governance labels to the secret.
      steps:
        - Define a labeling standard (owner, environment, data-classification).
        - Apply labels to the secret via update.
      verifyCommand: gcloud secrets list --project <project> --format json
    compliance: []
    references:
      - https://cloud.google.com/secret-manager/docs/creating-and-accessing-secrets
